name: Deploy to Masora

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select Environment'
        required: true
        default: 'masora'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Masora
        if: ${{ github.event.inputs.environment == 'masora' }}
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: "-avz --delete"
          path: "./dist/"
          remote_path: "/var/www/masora.sismas.com.co/"
          remote_host: ${{ secrets.SFTP_HOST }}
          remote_user: ${{ secrets.SFTP_USER }}
          remote_key: ${{ secrets.SSH_KEY }}
          remote_port: ${{ secrets.SFTP_PORT }}
