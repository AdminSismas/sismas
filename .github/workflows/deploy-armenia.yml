name: Deploy Armenia (SSM)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::476114140163:role/GitHub-Portal-DeployRole
          aws-region: us-east-1

      - name: Deploy Armenia via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-05e4578276976506e" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Armenia from GitHub Actions" \
            --parameters commands='[
              "cd /opt/sismas-source",
              "git pull origin main",
              "/usr/bin/pnpm install --frozen-lockfile",
              "/usr/bin/pnpm run build --configuration=armenia",
              "rm -rf /usr/share/nginx/armenia.sismas.com.co/*",
              "cp -r dist/* /usr/share/nginx/armenia.sismas.com.co/"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id i-05e4578276976506e

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id i-05e4578276976506e
