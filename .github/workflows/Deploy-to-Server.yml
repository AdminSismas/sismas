name: Deploy to Server

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (manizales, armenia, masora)'
        required: true
        default: 'manizales'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Extract the environment from Pull Request title or body
      - name: Set Environment
        id: set-environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          elif [[ "${{ github.event.pull_request.title }}" =~ "manizales" ]]; then
            echo "environment=manizales" >> $GITHUB_ENV
          elif [[ "${{ github.event.pull_request.title }}" =~ "armenia" ]]; then
            echo "environment=armenia" >> $GITHUB_ENV
          elif [[ "${{ github.event.pull_request.title }}" =~ "masora" ]]; then
            echo "environment=masora" >> $GITHUB_ENV
          else
            echo "Environment not specified in Pull Request title."
            exit 1
          fi

      # 3. Deploy based on environment
      - name: Deploy to Environment
        run: |
          if [[ "${{ env.environment }}" == "manizales" ]]; then
            echo "Deploying to Manizales..."
            rsync -avz --delete ./dist/ ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/var/www/manizales.sismas.com.co/
          elif [[ "${{ env.environment }}" == "armenia" ]]; then
            echo "Deploying to Armenia..."
            rsync -avz --delete ./dist/ ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/var/www/armenia.sismas.com.co/
          elif [[ "${{ env.environment }}" == "masora" ]]; then
            echo "Deploying to Masora..."
            rsync -avz --delete ./dist/ ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/var/www/masora.sismas.com.co/
          else
            echo "Invalid environment: ${{ env.environment }}"
            exit 1
          fi
