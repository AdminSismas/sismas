name: Deploy Desarrollo (SSM)

on:
  workflow_dispatch:

concurrency:
  group: sismas-deploy-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::476114140163:role/GitHub-Portal-DeployRole
          aws-region: us-east-1

      - name: Deploy DEV (fire-and-forget)
        shell: bash
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region us-east-1 \
            --instance-ids "i-05e4578276976506e" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy DEV dev.sismas.com.co" \
            --parameters commands='[
              "set -e",
              "cd /opt/sismas-source-dev",
              "git fetch --all --prune",
              "git checkout despliegue-desarrollo",
              "git reset --hard origin/despliegue-desarrollo",
              "/usr/bin/pnpm install --frozen-lockfile",
              "/usr/bin/pnpm run build --configuration=dev",
              "rm -rf /usr/share/nginx/dev.sismas.com.co/*",
              "cp -r dist/* /usr/share/nginx/dev.sismas.com.co/"
            ]' \
            --query "Command.CommandId" \
            --output text)
