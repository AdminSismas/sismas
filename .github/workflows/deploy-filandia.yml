name: Deploy Filandia (SSM)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::476114140163:role/GitHub-Portal-DeployRole
          aws-region: us-east-1

      - name: Deploy Filandia
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-05e4578276976506e" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /opt/sismas-source",
              "git pull origin main",
              "/usr/bin/pnpm install --frozen-lockfile",
              "/usr/bin/pnpm run build --configuration=filandia",
              "rm -rf /usr/share/nginx/filandia.sismas.com.co/*",
              "cp -r dist/* /usr/share/nginx/filandia.sismas.com.co/"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id i-05e4578276976506e
