<mat-form-field
  [id]="idCombo"
  [ngClass]="cssClasses"
  [hideRequiredMarker]="hideRequiredMarker"
  class="w-full sm:ml-2 sm:mr-2">
  <mat-label>{{ label }}</mat-label>
  <mat-select
    [formControlName]="formControlNameCombobox"
    [placeholder]="placeholder"
    (selectionChange)="onSelectionChange($event.value)"
    [panelWidth]="500">
    @if (filteredOptions$ | async; as options) {
      @for (option of options; track option) {
        @if (valueKey && valueKey != '') {
          <mat-option [value]="option[valueKey]">
            {{ option[fielKey] }}
          </mat-option>
        } @else {
          <mat-option [value]="option">
            {{ option[fielKey] }}
          </mat-option>
        }
      } @empty {
        <mat-option>
          {{ STRING_INFORMATION_NOT_FOUND }}
        </mat-option>
      }
    } @else {
      <mat-option>
        {{ STRING_INFORMATION_NOT_FOUND }}
      </mat-option>
    }
  </mat-select>
</mat-form-field>
