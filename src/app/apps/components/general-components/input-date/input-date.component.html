<mat-form-field
  [id]="idComboInput + 23432 + 31231232"
  class="mainClass"
  [ngClass]="cssClasses"
  [hideRequiredMarker]="hideRequiredMarker"
  appearance="outline">
  @if (label && label.length > 0) {
    <mat-label>{{ label }}</mat-label>
  }
  <input
    [id]="idComboInput + 23432 + 31231232 + 'input'"
    matInput
    [matDatepicker]="datepickerRef"
    placeholder="{{ placeHolder }}&hellip;"
    [max]="maxDate"
    [formControlName]="formControlName"
    [min]="minDate"
  />
  @if (icon && icon.length > 0) {
    <mat-icon matSuffix [svgIcon]="icon"></mat-icon>
  }
  @if (hintValue && hintValue.length > 0) {
    <mat-hint class="mb-1">{{ hintValue }}</mat-hint>
  }
  <mat-datepicker-toggle
    [for]="datepickerRef"
    class="block"
    matIconPrefix></mat-datepicker-toggle>
  <mat-datepicker #datepickerRef></mat-datepicker>
</mat-form-field>
