
<section class="h-full">
  <div class="swiper h-full">
    <div class="swiper-wrapper">
      @for (image of images(); let index = $index; track index) {
        <div class="swiper-slide relative">
          @if (deleteButton()) {
            <button
              mat-mini-fab
              aria-label="Eliminar imagen"
              matTooltip="Eliminar imagen"
              color="warn"
              class="absolute z-10 top-4 right-4"
              tabindex="-1"
              (click)="onDeleteImage(image.url)"
            >
              <mat-icon svgIcon="mat:delete"></mat-icon>
            </button>
          }

          <img
            [src]="image.url"
            [alt]="'Imagen ' + (index + 1)"
            class="block h-full w-auto max-w-full object-contain shadow-md shadow-black"
          />
          @if (showNames()) {
            <div class="absolute bottom-8 left-2 right-2 text-center shadow-md shadow-black bg-slate-300 bg-opacity-80 p-2 rounded">
              <h2 class="text-lg text-slate-700 truncate">{{ image.name }}</h2>
            </div>
          }
        </div>
      }
    </div>

    @if (images().length > 1) {
      <div class="swiper-pagination"></div>

      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
    }
  </div>
</section>
