<section class="h-full">
  <div class="h-full w-full relative">
    <button
      #prevButton
      class="absolute z-10 top-1/2 -translate-y-1/2 left-[10%] lg:left-[20%]"
      mat-fab
      color="primary"
      (click)="changeImage(-1)"
      disabled
    >
      <mat-icon svgIcon="mat:chevron_left"></mat-icon>
    </button>
    <button
      #nextButton
      class="absolute z-10 top-1/2 -translate-y-1/2 right-[10%] lg:right-[20%]"
      mat-fab
      color="primary"
      (click)="changeImage(1)"
      [disabled]="images().length <= 1"
    >
      <mat-icon svgIcon="mat:chevron_right"></mat-icon>
    </button>
    <ul
      #slides
      class="m-0 p-0 list-none"
    >
      @for (image of images(); let index = $index; track index) {
          <li
            class="slide flex justify-center items-center"
            [attr.data-active]="index === 0 ? true : null"
          >
            @if (deleteButton()) {
              <button
                mat-mini-fab
                aria-label="Eliminar imagen"
                matTooltip="Eliminar imagen"
                color="warn"
                class="absolute z-10 top-4 right-4"
                tabindex="-1"
                (click)="onDeleteImage(image)"
              >
                <mat-icon svgIcon="mat:delete"></mat-icon>
              </button>
            }
            <img
              [src]="image"
              [alt]="'Imagen ' + index"
              class="block h-full object-cover object-center shadow-md shadow-black"
            />
          </li>
      }
    </ul>
  </div>
</section>
