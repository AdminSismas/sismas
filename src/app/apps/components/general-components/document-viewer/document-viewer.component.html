<app-modal-window
  title="Documento"
  [actions]="false"
>
  <div
    class="flex flex-col h-full w-full bg-gray-100 rounded-md overflow-hidden shadow-sm"
  >
    <div
      class="h-full flex-1 flex justify-center items-center p-4 bg-gray-600 relative min-h-[300px]"
    >
      @if (isLoading()) {
        <div
          class="flex flex-col items-center justify-center text-center p-6 text-white"
        >
          <mat-spinner
            diameter="40"
            class="mb-4"
          ></mat-spinner>
          <p class="mt-2 text-base">Cargando documento...</p>
        </div>
      } @else if (error()) {
        <div
          class="flex flex-col items-center justify-center text-center p-6 text-white"
        >
          <mat-icon class="text-5xl w-12 h-12 mb-4 text-red-400"
            >error_outline</mat-icon
          >
          <p class="mt-2 text-base">No se pudo cargar el documento</p>
        </div>
      } @else if (data.pdfBlob) {
        <iframe
          [src]="safePdfUrl()"
          class="w-full h-full bg-white shadow-lg"
          style="border: none"
          (load)="onIframeLoad()"
          (error)="onIframeError()"
        ></iframe>
      } @else {
        <div
          class="flex flex-col items-center justify-center text-center p-6 text-white"
        >
          <mat-icon class="text-5xl w-12 h-12 mb-4">insert_drive_file</mat-icon>
          <p class="mt-2 text-base">No hay ningún documento para mostrar</p>
        </div>
      }
    </div>
  </div>
</app-modal-window>
