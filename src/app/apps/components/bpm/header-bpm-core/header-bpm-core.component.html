<div
  class="px-5 py-4 bg-primary-600/10 flex-none"
  [id]="idHeader"
>
  <div
    class="toolbar text-default w-full px-6 lg:pl-0 lg:pr-0 flex gap-2 items-center"
  >
    <h1
      class="subheading-2 font-medium m-0 ltr:pr-3 rtl:pl-3 ltr:border-r rtl:border-l ltr:mr-3 rtl:ml-3 flex-none"
    >
      <button
        color="primary"
        mat-button
        type="button"
        (click)="returnPanelTask.emit(true)"
      >
        <mat-icon
          class="ltr:-ml-1 rtl:-mr-1 ltr:mr-2 rtl:ml-2"
          svgIcon="mat:archive"
        ></mat-icon>
        <span>{{ CONSTANT_NAME_RETURN }}</span>
      </button>
    </h1>
    <vex-breadcrumbs class="mr-2" [crumbs]="this.crumbs">
    </vex-breadcrumbs>
    <button
      class="box min-w-3"
      color="primary"
      mat-button
      type="button"
      title="Comentarios"
      (click)="openDialog('comments')">
      <mat-icon
        class="ltr:-ml-1 rtl:-mr-1 ltr:mr-2 rtl:ml-2"
        svgIcon="mat:insert_comment"></mat-icon>
      <span class="box-text">{{ countComment$ | async }}</span>
    </button>
    <button
      class="box min-w-3"
      color="primary"
      mat-button
      type="button"
      title="Archivos"
      (click)="openDialog('documents')">
      <mat-icon
        class="ltr:-ml-1 rtl:-mr-1 ltr:mr-2 rtl:ml-2"
        svgIcon="mat:attach_file"></mat-icon>
      <span class="box-text">{{ countAttachment$ | async }}</span>
    </button>
    @if ((mode === 1 || mode === 3) && downLoadExcelButton) {
      <button
        class="box min-w-1"
        color="primary"
        mat-button
        type="button"
        title="Descargar Excel Masivo"
        (click)="openDialogExcel(TYPE_BUTTON_SEVEN)">
        <mat-icon
          svgIcon="cust:excel-file"
        ></mat-icon>
      </button>
    }
    @if ((mode === 1 || mode === 3) && addExcelButton) {
      <button
        class="box min-w-1"
        color="primary"
        mat-button
        type="button"
        title="Cargar Excel Masivo"
        (click)="openDialogExcel(TYPE_BUTTON_EIGHT)">
        <mat-icon
          svgIcon="cust:excel-add"
        ></mat-icon>
      </button>
    }
  </div>
</div>
