<app-modal-window
  [title]="title()"
  actions
  showCancelButton
  (dialog)="dialogRef.set($event)"
  (accept)="onAccept()"
>
  <app-dynamic-forms
    [inputs]="editTaskInputs()"
    (formReady)="form.set($event)"
    [initValues]="data.proflow"
    className="grid grid-cols-3 gap-4 w-full h-full"
  ></app-dynamic-forms>
</app-modal-window>
