<div class="flex justify-between">
  <h2 mat-dialog-title>Reasignar trámite</h2>
  <button
    mat-icon-button
    mat-dialog-close
    tabindex="-1"
  >
    <mat-icon svgIcon="mat:close"></mat-icon>
  </button>
</div>
<mat-divider class="bg-slate-400"></mat-divider>
<mat-dialog-content>
  <form
    class="w-full flex flex-row justify-center gap-6"
    [formGroup]="form"
    (submit)="filterUsers()"
  >
    <mat-form-field>
      <mat-label>Buscar usuario</mat-label>
      <input
        #filter
        matInput
        formControlName="filter"
        type="text"
      />
    </mat-form-field>
    <button
      mat-flat-button
      color="primary"
      type="submit"
    >
      <mat-icon svgIcon="mat:search"></mat-icon>
      Buscar
    </button>
  </form>
  @if (dataSource && dataSource.length > 0) {
    <table
      mat-table
      [dataSource]="dataSource$"
    >
      @for (column of columns; track column.property) {
        <ng-container [matColumnDef]="column.property">
          <th
            mat-header-cell
            *matHeaderCellDef
            class="text-center text-white font-bold"
          >
            {{ column.label }}
          </th>
          @if (column.property === "fullName") {
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element[column.property] | titlecase }}
            </td>
          }
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element[column.property] }}
          </td>
        </ng-container>
      }
      <tr
        mat-header-row
        *matHeaderRowDef="visibleColumns"
        class="bg-blue-500 sticky top-0"
      ></tr>
      <tr
        mat-row
        *matRowDef="let element; columns: visibleColumns"
        class="hover:bg-slate-200 cursor-pointer active:bg-slate-400"
        (click)="selectUser(element)"
        [class.bg-slate-300]="selectedUser === element"
      ></tr>
    </table>
  }
</mat-dialog-content>

<mat-dialog-actions align="center">
  <button
    mat-raised-button
    color="primary"
    [disabled]="!selectedUser"
    (click)="reassign()"
  >
    Reasignar >
  </button>
  <button
    mat-raised-button
    color="warn"
    mat-dialog-close
  >
    Cancelar >
  </button>
</mat-dialog-actions>
