<table
  mat-table
  [dataSource]="dataSource"
  matSort
  class="w-full h-full"
>
  @for (column of columns; track $index) {
    <ng-container [matColumnDef]="column.name">
      <th
        mat-header-cell
        *matHeaderCellDef
      >
        {{ column.title }}
      </th>
      <td
        mat-cell
        *matCellDef="let element"
      >{{ element[column.name] }}</td>
    </ng-container>
  }

  <ng-container matColumnDef="actions">
    <th
      *matHeaderCellDef
      mat-header-cell
    >
      Acciones
    </th>
    <td
      *matCellDef="let row"
      class="w-10 text-secondary"
    >
      <button
        mat-icon-button
        [matMenuTriggerData]="{ row: row }"
        [matMenuTriggerFor]="actionsMenu"
      >
        <mat-icon svgIcon="mat:more_horiz"></mat-icon>
      </button>
    </td>
  </ng-container>

  <tr
    mat-header-row
    *matHeaderRowDef="displayColumns"
  ></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayColumns"
  ></tr>
</table>

<mat-menu
  #actionsMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <ng-template
    let-row="row"
    matMenuContent
  >
    @for (action of actionsBtn(); track $index) {
      <button
        mat-menu-item
        (click)="action.action(row)"
      >
        <mat-icon [svgIcon]="action.icon"></mat-icon>
        <span>{{ action.label }}</span>
      </button>
    }
  </ng-template>
</mat-menu>
