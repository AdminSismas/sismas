<table
  mat-table
  [dataSource]="dataSource"
  multiTemplateDataRows
  class="w-full"
>
  @for (column of columns; track columns) {
    <ng-container [matColumnDef]="column.name">
      <th
        mat-header-cell
        *matHeaderCellDef
      >
        {{ column.title }}
      </th>
      <td
        mat-cell
        *matCellDef="let element"
      >
        {{ element[column.name] }}
      </td>
    </ng-container>
  }

  <ng-container matColumnDef="expand">
    <th
      mat-header-cell
      *matHeaderCellDef
      aria-label="row actions"
    >
      Ver detalles
    </th>
    <td
      mat-cell
      *matCellDef="let element"
    >
      <button
        mat-icon-button
        aria-label="expand row"
        (click)="expandRow(element); $event.stopPropagation()"
      >
        @if (expandedElement === element) {
          <mat-icon svgIcon="mat:keyboard_arrow_up"></mat-icon>
        } @else {
          <mat-icon svgIcon="mat:keyboard_arrow_down"></mat-icon>
        }
      </button>
    </td>
  </ng-container>

  <!-- Expanded Content Column - the detail row is made up of this one column that spans across all columns -->
  <ng-container matColumnDef="expandedDetail">
    <td
      mat-cell
      *matCellDef="let element"
      [attr.colspan]="columnsToDisplayWithExpand.length"
    >
      <div
        class="overflow-hidden flex flex-col"
        [@detailExpand]="expandedElement === element ? 'expanded' : 'collapsed'"
      >
        @for (value of element.details; track $index) {
          <section class="grid grid-cols-[10%_1fr_1fr] grid-flow-row">
            <strong>{{ $index + 1 }}</strong>
            <div class="flex gap-4 items-center">
              <strong>Vigencia:</strong>
              <span>{{ value.vigencia }}</span>
            </div>
            <div class="flex gap-4 items-center">
              <strong>Valor:</strong>
              <span>{{ value.valor | number:'1.0-0' }}</span>
            </div>
            <mat-divider class="col-span-3 my-2"></mat-divider>
          </section>
        }
      </div>
    </td>
  </ng-container>

  <tr
    mat-header-row
    *matHeaderRowDef="columnsToDisplayWithExpand"
  ></tr>
  <tr
    class="cursor-pointer"
    mat-row
    *matRowDef="let row; columns: columnsToDisplayWithExpand"
    (click)="expandRow(row)"
  ></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: ['expandedDetail']"
    [style.display]="expandedElement === row ? '' : 'none'"
  ></tr>
</table>
