<main class="p-4 w-full h-full bg-white">
  <button
    mat-flat-button
    color="primary"
    (click)="openDialogCreateZone()"
  >
    Crear zona {{ typeZone }}
    <mat-icon svgIcon="mat:add"></mat-icon>
  </button>
  @if (typeZone !== "geoeconómica") {
    <table
      mat-table
      [dataSource]="dataSource"
      class="w-full"
    >
      @for (column of columns; track $index) {
        <ng-container [matColumnDef]="column.name">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            {{ column.title }}
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element[column.name] }}
          </td>
        </ng-container>
      }
      <ng-container matColumnDef="actions">
        <th
          *matHeaderCellDef
          mat-header-cell
        >
          Acciones
        </th>
        <td
          *matCellDef="let row"
          class="w-10 text-secondary"
          mat-cell
        >
          <button
            (click)="$event.stopPropagation()"
            [matMenuTriggerData]="{ row: row }"
            [matMenuTriggerFor]="actionsMenu"
            mat-icon-button
            type="button"
          >
            <mat-icon svgIcon="mat:more_horiz"></mat-icon>
          </button>
        </td>
      </ng-container>

      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns"
      ></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
      ></tr>
    </table>
  } @else {
    <economic-zone
      [dataSource]="dataSource"
    ></economic-zone>
  }
  <mat-menu
    #actionsMenu="matMenu"
    xPosition="before"
    yPosition="below"
  >
    <ng-template
      let-row="row"
      matMenuContent
    >
      @for (actionBtn of actionBtns(); track actionBtn.id) {
        <button
          mat-menu-item
          (click)="onClickActionBtn(actionBtn.id, row)"
        >
          <mat-icon [svgIcon]="actionBtn.icon" />
          <span>{{ actionBtn.label }}</span>
        </button>
      } @empty {
        <button
          mat-menu-item
          disabled
        >
          <span class="text-center">No options</span>
        </button>
      }
    </ng-template>
  </mat-menu>
</main>
