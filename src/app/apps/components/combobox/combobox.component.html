<mat-form-field [ngClass]="cssClasses" *ngIf="options">
  <mat-label>{{label}}</mat-label>
  <mat-select
    [formControlName]="formControlNameCombobox" [id]="idCombo"
    placeholder="{{placeholder}}">
    <mat-option
      *ngFor="let option of options;"
      [value]="option">
      {{option}}
    </mat-option>
  </mat-select>
</mat-form-field>
