<!-- <div class="flex flex-col w-[48%]"> -->
    <div class="header-container m-2 flex items-center justify-between">
        <span class="font-bold text-xl">Zonas geoeconómicas</span>
        <button
          [ngClass]="disabledClass()"
          [disabled]="!editable"
          *ngIf="typeInformation === 'edition'"
          mat-raised-button
          color="primary"
          type="button"
          (click)="
            onClickOpenGeoconomicAddEditModal(dataSourceGeoeconomicZones)
          "
        >
          Nueva
          <mat-icon svgIcon="mat:add"></mat-icon>
        </button>
      </div>
  
      <!-- Mostrar mensaje si no hay Zonas geoeconómicas -->
      <div
        *ngIf="
          !dataSource ||
          dataSource.data.length === 0
        "
        class="flex justify-center items-center py-4"
      >
        <p class="text-gray-500 text-lg">
          No hay Zonas geoeconómicas para mostrar.
        </p>
      </div>
  
      <!-- Mostrar tabla solo si hay datos -->
      <div
        *ngIf="
          dataSource &&
          dataSource.data.length > 0
        "
        class="table-container overflow-x-auto w-full"
      >
        <table
          mat-table
          [dataSource]="dataSource"
          matSort
          class="w-full"
        >
  
          <!-- Columnas dinámicas -->
        
  
          <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
              <ng-container [matColumnDef]="column.property">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ column.label }}</th>
                <td mat-cell *matCellDef="let row">
  
                  <ng-container *ngIf="column.property === 'viewDetailEcono'">
                      <div
                      class="flex align-middle text-center content-center items-center"
                    >
                      <button
                        class="w-8 h-8 p-0 mr-1 leading-none flex items-center justify-center m-0 hover:bg-hover text-green-600 bg-green-600/10"
                        mat-icon-button
                        title="Detalles"
                        (click)="openInformationPropertyZone(row, 'geoeconomic')"
                      >
                        <mat-icon
                          class="icon-sm text-green-500"
                          svgIcon="mat:visibility"
                        ></mat-icon>
                      </button>
                    </div>
                  </ng-container>
  
                  <ng-container *ngIf="column.type === 'text'">
                    {{ row[column.property] }}
                  </ng-container>
                  <ng-container *ngIf="column.type === 'operationType'">
                    {{ row[column.property] ? 'Sí' : 'No' }}
                  </ng-container>
  
                  <ng-container *ngIf="column.type === 'badge'">
                      {{ row.ccZonaHomoGeoEconomica?.zonaHomoGeoEconomicaCode }}
                    </ng-container>
                    <ng-container *ngIf="column.type === 'progress'">
                      {{ row.ccZonaHomoGeoEconomica?.vigencia }}
                    </ng-container>
                    
                </td>
              </ng-container>
            </ng-container>
  
  
  
          <!-- Acciones -->
          <ng-container matColumnDef="actions">
            <th
              *matHeaderCellDef
              mat-header-cell
            ></th>
            <td
              *matCellDef="let row"
              class="w-10 text-secondary"
              mat-cell
            >
              <button
                *ngIf="typeInformation === 'edition'"
                mat-icon-button
                [matMenuTriggerData]="{ infoOwner: row }"
                [matMenuTriggerFor]="actionsGeoconomicMenu"
                type="button"
              >
                <mat-icon svgIcon="mat:more_horiz"></mat-icon>
              </button>
            </td>
          </ng-container>
  
          <tr
            mat-header-row
            *matHeaderRowDef="visibleColumns"
          ></tr>
          <tr
            mat-row
            @fadeInUp
            class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
            *matRowDef="let row; columns: visibleColumns"
          ></tr>
        </table>
  
        <mat-menu
          #actionsGeoconomicMenu="matMenu"
          xPosition="before"
          yPosition="below"
        >
          <ng-template
            let-infoOwner="infoOwner"
            matMenuContent
          >
            <button
              *ngFor="let actionBtn of actionBtns()"
              mat-menu-item
              (click)="onClickGeoconomicActionBtn(actionBtn.id, infoOwner)"
            >
              <mat-icon [svgIcon]="actionBtn.icon"></mat-icon>
              <span>{{ actionBtn.label }}</span>
            </button>
            <button
              mat-menu-item
              disabled
              *ngIf="actionBtns().length === 0"
            >
              <span class="text-center">No options</span>
            </button>
          </ng-template>
        </mat-menu>
      </div>
  
      <div
        *ngIf="
          dataSourceGeoeconomicZones &&
          dataSourceGeoeconomicZones.data.length > 0
        "
        class="paginator-container flex justify-center"
      >
        <mat-paginator
          #paginator2
          [pageSizeOptions]="pageSizeOptions2"
          [length]="totalGeoElements"
          [pageSize]="pageSize2"
          [pageIndex]="page2"
          (page)="refreshPaginator($event, 'paginator2')"
          class="paginator"
        />
      </div>
  <!-- </div> -->
