<mat-accordion class="flex flex-col py-0 px-0 mb-2">
  <mat-expansion-panel
    (opened)="isExpandPanel((expandedComponent = true))"
    [expanded]="expandedComponent"
  >
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Zonas"
        icon="mat:description"
        id="information-ZonespropertyData"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    <mat-panel-description class="py-0 px-0">
      <div class="flex w-full justify-between">
        <div class="flex flex-col w-[48%]">
          <!-- Title for the First Table -->
          <div class="header-container m-2 flex items-center justify-between">
            <span class="font-bold text-xl">Zonas físicas</span>
            <button
              [ngClass]="disabledClass()"
              [disabled]="!editable"
              *ngIf="typeInformation === 'edition'"
              mat-raised-button
              color="primary"
              type="button"
              (click)="onClickOpenAddEditModal(dataSource)"
            >
              Nueva
              <mat-icon svgIcon="mat:add"></mat-icon>
            </button>
          </div>

          <!-- Mostrar mensaje si no hay Zonas físicas -->
          <div
            *ngIf="!dataSource || dataSource.data.length === 0"
            class="flex justify-center items-center py-4"
          >
            <p class="text-gray-500 text-lg">
              No hay Zonas físicas para mostrar.
            </p>
          </div>

          <!-- Mostrar tabla solo si hay datos -->

          <div
          *ngIf="dataSource && dataSource.data.length > 0"
          class="table-container overflow-x-auto w-full"
        >
        <!-- Tabla -->
        <vex-physical-zones-property

        [id]="id"
        [expandedComponent]="expandedComponent"
        [schema]="schema" 
        [baunitId]="baunitId"
        [editable]="editable"
        [divPolLv1]="divPolLv1"
        [divPolLv2]="divPolLv2"
        [executionId]="executionId"
        [typeInformation]="typeInformation"

        ></vex-physical-zones-property>

      </div>
        
        </div>

        <div class="border-l-2 border-gray-300"></div>

        <!-- Second Table -->
<vex-geo-economic-zones-property

[id]="id"
[expandedComponent]="expandedComponent"
[schema]="schema" 
[baunitId]="baunitId"
[editable]="editable"
[divPolLv1]="divPolLv1"
[divPolLv2]="divPolLv2"
[executionId]="executionId"
[typeInformation]="typeInformation"
></vex-geo-economic-zones-property>
        
      </div>
    </mat-panel-description>
  </mat-expansion-panel>
</mat-accordion>
