<h2 mat-dialog-title>Editar aspectos generales</h2>
<mat-divider class="text-border border-slate-400"></mat-divider>

<mat-dialog-content>
  <form [formGroup]="form" class="grid grid-flow-row grid-cols-2 gap-x-4">
    <!-- Recorrer los grupos -->
    <ng-container *ngFor="let group of inputs">
      <!-- Título del grupo -->
      <h3 class="col-span-2 text-black text-center text-sm" style="margin: 16px;">{{ group.groupName }}</h3>

      <!-- Recorrer los campos del grupo -->
      <ng-container *ngFor="let input of group.fields">
        <ng-container *ngIf="input.collection">
          <vex-combox-colletion
            [label]="input.label"
            [formControlNameCombobox]="input.name"
            [typeDomainName]="input.type"
            [placeholderDomainName]="input.placeholder"
            [idComboCollection]="input.name"
            cssClasses="w-full"
          ></vex-combox-colletion>
        </ng-container>
        <ng-container *ngIf="!input.collection && input.type === 'date'">
          <!-- <mat-form-field>
            <mat-label>{{ input.label }}</mat-label>
            <input
              matInput
              [type]="input.type"
              [placeholder]="input.placeholder"
              [formControlName]="input.name"
            />
          </mat-form-field> -->
          <mat-form-field >
            <mat-label>{{ input.label }}</mat-label>
            <input
              matInput
              [matDatepicker]="beginAt"
              [formControlName]="input.name"
            />
            <mat-hint>Formato fecha: DD/MM/YYYY</mat-hint>
            <mat-datepicker-toggle
              matIconSuffix
              [for]="beginAt"
            ></mat-datepicker-toggle>
            <mat-datepicker #beginAt></mat-datepicker>
          </mat-form-field>
        </ng-container>
        <ng-container *ngIf="!input.collection && input.type !== 'date'">
          <mat-form-field>
            <mat-label>{{ input.label }}</mat-label>
            <input
              matInput
              [type]="input.type"
              [placeholder]="input.placeholder"
              [formControlName]="input.name"
            />
          </mat-form-field>
        </ng-container>
      </ng-container>
    </ng-container>

    <mat-dialog-actions align="center" class="col-span-2 py-2">
      <button mat-flat-button color="primary" (click)="editBasicInformationProperty()">
        Aceptar
      </button>
      <button mat-flat-button mat-dialog-close color="warn">
        Cancelar
      </button>
    </mat-dialog-actions>
  </form>
</mat-dialog-content>
