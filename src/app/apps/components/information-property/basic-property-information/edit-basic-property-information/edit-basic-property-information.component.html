<h2 mat-dialog-title>Editar aspectos generales</h2>
<mat-divider class="text-border border-slate-400"></mat-divider>

<mat-dialog-content>
  <form
    [formGroup]="form"
    class="grid grid-flow-row grid-cols-2 gap-x-4"
  >
    @for (input of inputs; track input.name) {
      @if (input.collection) {
        <vex-combox-colletion
          [label]="input.label"
          [formControlNameCombobox]="input.name"
          [typeDomainName]="input.type"
          [placeholderDomainName]="input.placeholder"
          [idComboCollection]="input.name"
          cssClasses="w-full"
        ></vex-combox-colletion>
      } @else {
        <mat-form-field>
          <mat-label>{{ input.label }}</mat-label>
          <input
            matInput
            [type]="input.type"
            [placeholder]="input.placeholder"
            [formControlName]="input.name"
          />
        </mat-form-field>
      }
    }
    <mat-dialog-actions align="center" class="col-span-2 py-2">
      <button
        mat-flat-button
        color="primary"
        (click)="editBasicInformationProperty()"
      >
        Aceptar
      </button>
      <button
        mat-flat-button
        mat-dialog-close
        color="warn"
      >
        Cancelar
      </button>
    </mat-dialog-actions>
  </form>
</mat-dialog-content>
