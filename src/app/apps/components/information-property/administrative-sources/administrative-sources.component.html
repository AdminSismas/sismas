<mat-accordion
  class="flex flex-col py-0 px-0 mb-2 classAdministrativeSources"
  [id]="id"
>
  <mat-expansion-panel
    (opened)="isExpandPanel((expandedComponent = true))"
    [expanded]="expandedComponent"
  >
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Fuentes administrativas"
        icon="mat:source"
        id="administrativeSources"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    @if (expandedComponent) {
      <mat-panel-description
        class="py-0 px-0 pt-0 pb-0"
        [id]="id + 'mat-panel-description'"
      >
        <table
          mat-table
          [dataSource]="dataSource"
        >
          <!-- Tipo fuente administrativa -->
          <ng-container matColumnDef="domFuenteAdministrativaTipo">
            <th
              mat-header-cell
              *matHeaderCellDef
            >
              Tipo fuente administrativa
            </th>
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element.domFuenteAdministrativaTipo }}
            </td>
          </ng-container>

          <!-- Fecha documento -->
          <ng-container matColumnDef="fechaDocumentoFuente">
            <th
              mat-header-cell
              *matHeaderCellDef
            >
              Fecha documento
            </th>
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element.fechaDocumentoFuente }}
            </td>
          </ng-container>

          <!-- Número fuente -->
          <ng-container matColumnDef="numeroFuente">
            <th
              mat-header-cell
              *matHeaderCellDef
            >
              Número fuente
            </th>
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element.numeroFuente }}
            </td>
          </ng-container>

          <!-- Ente emisor -->
          <ng-container matColumnDef="enteEmisor">
            <th
              mat-header-cell
              *matHeaderCellDef
            >
              Ente emisor
            </th>
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element.enteEmisor }}
            </td>
          </ng-container>

          <tr
            mat-header-row
            *matHeaderRowDef="displayedColumns"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
          ></tr>
        </table>
      </mat-panel-description>
    }
  </mat-expansion-panel>
</mat-accordion>
