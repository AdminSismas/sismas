<mat-accordion
  class="flex flex-col p-0 mb-2"
  [id]="id"
>
  <mat-expansion-panel [expanded]="expandedComponent">
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Fuentes administrativas"
        icon="mat:source"
        id="administrativeSources"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    @if (expandedComponent) {
      <mat-panel-description
        class="p-0"
        [id]="id + 'mat-panel-description-administrative-sources'"
      >
        <table
          mat-table
          [dataSource]="example_data"
        >
          <ng-container matColumnDef="domFuenteAdministrativaTipo">
            <th
              mat-header-cell
              *matHeaderCellDef
            >
              Tipo fuente administrativa
            </th>
            <td
              mat-cell
              *matCellDef="let element"
            >
              {{ element.domFuenteAdministrativaTipo }}
            </td>
          </ng-container>
          <tr
            mat-header-row
            *matHeaderRowDef="displayedColumns"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
          ></tr>
        </table>
      </mat-panel-description>
    }
  </mat-expansion-panel>
</mat-accordion>
