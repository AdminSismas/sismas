<div class="flex items-center bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar" mat-dialog-title>
  <h3 class="subheading-2 m-0 flex-auto">
    @if (this.crudInformationData && this.crudInformationData.type === 'UPDATE') {
      Editar Colindante
    } @else if (this.crudInformationData && this.crudInformationData.type === 'CREATE') {
      Nueva Colindante
    }
  </h3>
  <button class="text-secondary" mat-icon-button type="button" (click)="handleDialogClose()">
    <mat-icon svgIcon="mat:close" class="icon-xs"></mat-icon>
  </button>
</div>
<mat-divider class="text-border"></mat-divider>

<swal
  #saveConfirmDialog
  title="¿Estás seguro?"
  text="¿Deseas guardar los cambios realizados?"
  icon="warning"
  [showCancelButton]="true"
  [confirmButtonText]="'Sí, guardar cambios'"
  [cancelButtonText]="'Cancelar'"
  [confirmButtonColor]="'#3085d6'"
  [cancelButtonColor]="'#d33'">
</swal>

<swal
  #successDialog
  title="¡Guardado!"
  text="Los datos se han actualizado correctamente."
  icon="success"
  [showConfirmButton]=false
>
</swal>

<swal
  #validationErrorDialog
  title="¡Error!"
  text="Por favor, corrige las validaciones del formulario."
  icon="error"
  [confirmButtonColor]="'#3f51b5'">
</swal>

<swal
  #calificationSuccessDialog
  title="¡Calificación Guardada!"
  text="Los datos de la calificación han sido registrados."
  icon="success"
  [confirmButtonColor]="'#3f51b5'">
</swal>

<swal
  #errorSaveDialog
  title="¡Error!"
  text="No se logro almacenar la informacion."
  icon="error">
</swal>

<swal
  #formError
  title="Error"
  icon="error"
  text="Por favor, corrija los errores en el formulario para continuar."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #idError
  title="Error"
  icon="error"
  text="El ID de la unidad básica no está definido."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #qualificationError
  title="Error"
  icon="error"
  text="Modo de calificación no reconocido."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #warningQualificationDialog
  title="Atención"
  icon="warning"
  text="Al cambiar de tipo de calificación se procedera a eliminar la informacion diligenciada en este formulario."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #incompleteForm
  title="Error"
  icon="error"
  text="Por favor, completa todos los campos requeridos en la calificación tradicional."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #notFoundValues
  title="Error"
  icon="error"
  text="No se encontraron valores válidos para enviar."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #saveErrorDialog
  title="Error"
  icon="error"
  text="Ocurrió un error al guardar la calificación tradicional"
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #selectTypeError
  title="Error"
  icon="error"
  text="Por favor, selecciona una tipología antes de continuar."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #successQualificationType
  title="Calificación Completa"
  icon="success"
  text="La calificación por tipología se guardó correctamente."
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #errorQualificationType
  title="Error"
  icon="error"
  text="Ocurrió un error al guardar la calificación por tipología"
  confirmButtonColor="#3f51b5"
></swal>

<swal
  #closeDialog
  text="¿Está seguro de cerrar?. Los cambios no se guardarán."
  icon="warning"
  [showCancelButton]="true"
  [confirmButtonColor]="'#3085d6'"
  [cancelButtonColor]="'#d33'"
  [confirmButtonText]="'Sí, cerrar'"
  [cancelButtonText]="'Cancelar'"
></swal>
