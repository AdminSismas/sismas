<mat-accordion
    class="flex flex-col py-0 px-0 mb-2 classInformationSource"
    [id]="id"
>
    <mat-expansion-panel
        (opened)="isExpandPanel((expandedComponent = true))"
        [expanded]="expandedComponent"
    >
        <mat-expansion-panel-header class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center">
            <vex-header-cadastral-information-property
                label="Fuente"
                icon="mat:source"
                id="business_centerFuente"
            >
            </vex-header-cadastral-information-property>
        </mat-expansion-panel-header>

        <mat-panel-description class="py-0 px-0 flex flex-col" [id]="id + 'mat-panel-description'">
            <div class="w-full flex flex-col overflow-auto pt-2">
                <!-- Table -->
                <table
                    @stagger
                    [dataSource]="dataSource"
                    class="w-full"
                    mat-table
                    matSort
                    [id]="id + 'tableFolio'">

                    <!-- Text Columns -->
                    <ng-container *ngFor="let column of columns; trackBy: trackByProperty;">
                        <!-- Text -->
                        <ng-container *ngIf="column.visible && column.type === 'text'" [matColumnDef]="column.property">
                            <th *matHeaderCellDef
                                [ngClass]="column.cssClassesHead"
                                class="text-center"
                                mat-header-cell
                                mat-sort-header>
                            {{ column.label }}
                            </th>
                            <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                            {{ row[column.property] }}
                            </td>
                        </ng-container>

                    </ng-container>
                    
                    <tr *matHeaderRowDef="visibleColumns" mat-header-row class="bg-[#e5e7eb]"></tr>
                    <tr *matRowDef="let row; columns: visibleColumns" @fadeInUp mat-row
                        class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"></tr>
                </table>

                <mat-paginator
                    #paginator
                    [pageSizeOptions]="pageSizeOptions"
                    [length]="totalElements"
                    [pageSize]="pageSize"
                    [pageIndex]="page"
                    (page)="refreshInformationPaginator($event)"
                    class="paginator"
                ></mat-paginator>
            </div>
        </mat-panel-description>

    </mat-expansion-panel>

</mat-accordion>
