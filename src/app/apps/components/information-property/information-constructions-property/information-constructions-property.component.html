<mat-accordion class="flex flex-col py-0 px-0 classInformationConstructions">
  <mat-expansion-panel
    (opened)="isExpandPanel()"
    [expanded]="expandedComponent()"
  >
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Construcciones"
        icon="mat:business"
        id="businessConstructions"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    @if (expandedComponent()) {
      <mat-panel-description class="py-0 px-0">
        <div class="w-full flex flex-col overflow-auto">
          <!-- Contenedor de botones y filtro -->
          @if (
            typeInformation === "edition" ||
            (dataSource && dataSource.data.length > 3)
          ) {
            <div class="px-4 h-16 border-b sticky left-0 flex items-center">
              <!-- Botón "Nueva" SIEMPRE visible en edición -->
              @if (typeInformation === "edition") {
                <div class="flex gap-4">
                  <button
                    mat-raised-button
                    type="button"
                    [ngClass]="
                      !editable ? '!bg-slate-400 !text-gray-100 opacity-60' : ''
                    "
                    [color]="editable ? 'primary' : ''"
                    [disabled]="!editable"
                    (click)="openAddConstructionInformationProperty()"
                  >
                    Nueva
                    <mat-icon svgIcon="mat:add"></mat-icon>
                  </button>
                  <button
                    mat-raised-button
                    type="button"
                    [ngClass]="
                      !editable ? '!bg-slate-400 !text-gray-100 opacity-60' : ''
                    "
                    [color]="editable ? 'accent' : ''"
                    [disabled]="!editable"
                    (click)="openEditConstruction()"
                  >
                    Adminstrar
                    <mat-icon svgIcon="mat:edit"></mat-icon>
                  </button>
                </div>
              } @else {
                <span class="flex-1"></span>
              }

              <!-- Filtro: Visible en modo listar cuando hay datos.
                También visible en modo edición cuando hay datos -->
              @if (dataSource && dataSource.data.length > 0) {
                <mat-form-field
                  subscriptSizing="dynamic"
                  class="pl-1 pr-1 pt-6 pb-6 flex flex-col w-full max-w-xs ml-4"
                >
                  <mat-icon
                    matIconPrefix
                    svgIcon="mat:search"
                  ></mat-icon>
                  <input
                    matInput
                    [formControl]="searchCtrl"
                    placeholder="Filtrar construcciones"
                    type="text"
                  />
                </mat-form-field>
              }
              <span class="flex-1"></span>
            </div>
          }

          @if (expandedComponent()) {
            <app-table-constructions
              [dataSource]="dataSource"
              [columns]="columns"
              [baunitId]="baunitId"
              [schema]="schema"
              [executionId]="executionId"
              (copyInformationOutput)="copyInformation($event)"
              (deleteInformationOutput)="deleteInformation($event)"
              (editInformationOutput)="editInformation($event)"
            ></app-table-constructions>
          }
          <mat-paginator
            #paginator
            [pageSizeOptions]="pageSizeOptions"
            [length]="totalElements"
            [pageSize]="pageSize"
            [pageIndex]="page"
            (page)="refreshInformationPaginator($event)"
            class="paginator"
          ></mat-paginator>
        </div>
      </mat-panel-description>
    }
  </mat-expansion-panel>
</mat-accordion>

<swal
  #deleteSwal
  title="¡Éxito!"
  text="Información eliminada con éxito"
  icon="success"
  [confirmButtonText]="'Cerrar'"
  [confirmButtonColor]="'#3f51b5'"
>
</swal>

<swal
  #copySwal
  title="¡Éxito!"
  text="Información eliminada con éxito"
  icon="success"
  [confirmButtonText]="'Cerrar'"
  [confirmButtonColor]="'#3f51b5'"
>
</swal>

<swal
  #errorCopySwal
  title="Error"
  text="No fue posible copiar la Construccion"
  icon="error"
  [confirmButtonText]="'Cerrar'"
  [confirmButtonColor]="'#3f51b5'"
></swal>

<swal
  #errorSwal
  title="Error"
  text="No fue posible eliminar la información"
  icon="error"
  [confirmButtonText]="'Cerrar'"
  [confirmButtonColor]="'#3f51b5'"
></swal>

<swal
  #deletedConstruction
  title="Eliminar construcción"
  text="¿Desea eliminar la construcción?"
  icon="warning"
  [showCancelButton]="true"
  [confirmButtonText]="'Eliminar'"
  [cancelButtonText]="'Cancelar'"
  [confirmButtonColor]="'#3085d6'"
  [cancelButtonColor]="'#d33'"
>
</swal>

<swal
  #copyConstruction
  title="Copiar construcción"
  text="¿Desea copiar la construcción?"
  icon="info"
  [showCancelButton]="true"
  [confirmButtonText]="'Copiar'"
  [cancelButtonText]="'Cancelar'"
  [confirmButtonColor]="'#3085d6'"
  [cancelButtonColor]="'#d33'"
>
</swal>
