<mat-accordion class="flex flex-col py-0 px-0 mb-2 classInformationAppraisal">
    <mat-expansion-panel
      (opened)="isExpandPanel((expandedComponent = true))"
      [expanded]="expandedComponent"
    >
      <mat-expansion-panel-header
        class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
      >
      <vex-header-cadastral-information-property
        label="Trámites Históricos"
        icon="mat:description"
        id="information-ZonespropertyData"
      ></vex-header-cadastral-information-property>
       
      </mat-expansion-panel-header>

      @if (!dataSource || dataSource.data.length === 0) {
        <div class="flex justify-center items-center py-4">
          <p class="text-gray-500 text-lg">
            No hay Zonas físicas para mostrar.
          </p>
        </div>

      }
        

        @if (dataSource && dataSource.data.length > 0) {

        <div class="card overflow-auto mt-8"> <!-- mt-16 -->
          <div class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center">
              <span class="flex-1"></span>
              <!-- Campo de búsqueda -->
              <mat-form-field subscriptSizing="dynamic" class="pl-1 pr-1 pt-6 pb-6 flex flex-col">
                  <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
                  <input
                      matInput
                      [formControl]="searchCtrl"
                      placeholder="Filtrar dominio"
                      type="text"/>
              </mat-form-field>

              <!-- Botón de filtro -->
              <!-- <button
                  [matMenuTriggerFor]="columnFilterMenu"
                  mat-icon-button
                  matTooltip="Filtrar columnas"
                  type="button"
                  class="ml-4 flex-col">
                  <mat-icon svgIcon="mat:filter_list"></mat-icon>
              </button> -->
          </div>

          <!-- Tabla de dominios -->
          <table @stagger mat-table [dataSource]="dataSource" class="w-full " matSort>


               <!-- View button basic -->
               <ng-container matColumnDef="detailDirection">
                  <th mat-header-cell *matHeaderCellDef> Detalle </th> <!-- Encabezado -->
                  <td mat-cell *matCellDef="let row">
                    <!-- <button
                      (click)="informationDetail(row)"
                      mat-icon-button
                      title="Detalle del tramite">
                      <mat-icon class="icon-sm" svgIcon="mat:remove_red_eye"></mat-icon>
                    </button> -->
                  </td>
              </ng-container>
              <!-- Text Columns -->
              <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
                  <ng-container *ngIf="column.type === 'text'" [matColumnDef]="column.property">
                      <th *matHeaderCellDef mat-header-cell mat-sort-header>
                          {{ column.label }}
                      </th>
                      <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                          {{ row[column.property] }}
                      </td>
                  </ng-container>

                  <ng-container *ngIf="column.type === 'date'" [matColumnDef]="column.property">
                      <th *matHeaderCellDef mat-header-cell mat-sort-header>
                          {{ column.label }}
                      </th>
                      <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                          <mat-icon matIconPrefix *ngIf="column.property === 'originalFileName'" svgIcon="mat:picture_as_pdf" class="w-5 h-5 p-0 items-center justify-center text-red-600"></mat-icon>
                          {{ row[column.property] | date:'YYYY-MM-dd' }}
                      </td>
                  </ng-container>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="visibleColumns"></tr>
              <tr mat-row *matRowDef="let element; columns: visibleColumns;" @fadeInUp class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"></tr>
          </table>

          <!-- Paginador -->
          <mat-paginator
              #paginator
              [class.hidden]="!(isDesktop$ | async)"
              [pageSizeOptions]="pageSizeOptions"
              [length]="totalElements"
              [pageSize]="pageSize"
              [pageIndex]="page"
              (page)="refreshInformationpaginator($event)"
              class="sticky left-0 flex flex-col">
          </mat-paginator>
        </div>

        }
    </mat-expansion-panel>
  </mat-accordion>
