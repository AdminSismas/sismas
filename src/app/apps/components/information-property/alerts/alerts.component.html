<mat-accordion
  class="flex flex-col py-0 px-0 mb-2"
  [id]="id"
>
  <mat-expansion-panel
    (opened)="isExpandPanel((expandedComponent = true))"
    [expanded]="expandedComponent"
  >
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Alertas"
        icon="mat:people"
        id="alerts"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    <mat-panel-description
      class="py-0 px-0"
      [id]="id + 'mat-panel-description-alerts'"
    >
      <div class="flex flex-col w-full">
        <div class="header-container m-2">
          @if (typeInformation === "edition") {
          }
        </div>

        <!-- Mostrar mensaje si no hay alertas -->
        <div *ngIf="!dataSource || dataSource.data.length === 0" class="flex justify-center items-center py-4">
          <p class="text-gray-500 text-lg">No hay alertas para mostrar.</p>
        </div>

        <!-- Mostrar tabla si hay alertas -->
        <div class="table-container overflow-x-auto w-full" *ngIf="dataSource && dataSource.data.length > 0">
          <table mat-table [dataSource]="dataSource" class="w-full">
        
            <ng-container matColumnDef="viewDetail">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let alert">
                <button
                  class="w-8 h-8 p-0 mr-1 leading-none flex items-center justify-center m-0 hover:bg-hover text-green-600 bg-green-600/10"
                  mat-icon-button
                  (click)="openAlertDetails(alert)"
                >
                  <mat-icon class="icon-sm" svgIcon="mat:visibility"></mat-icon>
                </button>
              </td>
            </ng-container>
        
            <!-- Columna: Tipo -->
            <ng-container matColumnDef="domAlertType">
              <th mat-header-cell *matHeaderCellDef> Tipo </th>
              <td mat-cell *matCellDef="let alert"> {{ alert.domAlertType }} </td>
            </ng-container>
        
            <!-- Columna: Estado -->
            <ng-container matColumnDef="alertState">
              <th mat-header-cell *matHeaderCellDef> Estado </th>
              <td mat-cell *matCellDef="let alert"> {{ alert.alertState }} </td>
            </ng-container>
        
            <!-- Columna: Fecha Inicio -->
            <ng-container matColumnDef="alertStartAt">
              <th mat-header-cell *matHeaderCellDef> Fecha inicio </th>
              <td mat-cell *matCellDef="let alert"> {{ alert.alertStartAt | date: 'dd/MM/yyyy' }} </td>
            </ng-container>
        
            <!-- Columna: Fecha Fin -->
            <ng-container matColumnDef="alertFinishAt">
              <th mat-header-cell *matHeaderCellDef> Fecha fin </th>
              <td mat-cell *matCellDef="let alert">
                {{ alert.alertFinishAt ? (alert.alertFinishAt | date: 'dd/MM/yyyy') : 'Sin fecha' }}
              </td>
            </ng-container>
        
            <!-- Definición de filas -->
            <tr mat-header-row *matHeaderRowDef="['viewDetail', 'domAlertType', 'alertState', 'alertStartAt', 'alertFinishAt']"></tr>
            <tr mat-row *matRowDef="let row; columns: ['viewDetail', 'domAlertType', 'alertState', 'alertStartAt', 'alertFinishAt']"></tr>
          </table>
        </div>
        
        <!-- Paginador -->
        <div class="paginator-container flex justify-center" *ngIf="dataSource && dataSource.data.length > 0">
          <mat-paginator
            #paginator
            [pageSizeOptions]="pageSizeOptions"
            [length]="totalElements"
            [pageSize]="pageSize"
            [pageIndex]="page"
            (page)="refreshPaginator($event)"
            class="paginator"
          />
        </div>
      </div>
    </mat-panel-description>
  </mat-expansion-panel>
</mat-accordion>
