<mat-accordion
  class="flex flex-col py-0 px-0 mb-2"
  [id]="id"
>
  <mat-expansion-panel
    (opened)="isExpandPanel((expandedComponent = true))"
    [expanded]="expandedComponent"
  >
    <mat-expansion-panel-header
      class="bg-app-bar focus-visible:bg-app-bar focus:bg-app-bar pb-0 py-1 border-b sticky left-0 flex items-center"
    >
      <vex-header-cadastral-information-property
        label="Información de Unidades Prediales"
        icon="mat:contacts"
        id="information-unit-property"
      >
      </vex-header-cadastral-information-property>
    </mat-expansion-panel-header>
    @if (expandedComponent) {
    <mat-panel-description
      class="p-0!important"
      [id]="id + 'mat-panel-description-basic'"
    >
      <div class="card overflow-auto">
        <table
          @stagger
          [dataSource]="dataSource"
          class="w-full"
          mat-table
          matSort
        >
          <!-- Checkbox Column -->
          <ng-container matColumnDef="checkbox">
            <th
              *matHeaderCellDef
              mat-header-cell
              class="pl-1 pr-1"
            >
              <mat-checkbox
                (change)="$event ? masterToggle() : null"
                [checked]="selection.hasValue() && isAllSelected()"
                [indeterminate]="selection.hasValue() && !isAllSelected()"
                color="primary"
              >
              </mat-checkbox>
            </th>
            <td
              *matCellDef="let row"
              class="w-4 pl-1 pr-1"
              mat-cell
            >
              <mat-checkbox
                (change)="$event ? selection.toggle(row) : null"
                (click)="$event.stopPropagation()"
                [checked]="selection.isSelected(row)"
                color="primary"
              >
              </mat-checkbox>
            </td>
          </ng-container>

          <!-- Image Column -->
          <ng-container matColumnDef="image">
            <th
              *matHeaderCellDef
              mat-header-cell
              class="pl-1 pr-1"
            ></th>
            <td
              *matCellDef="let row"
              class="w-8 min-w-8 pl-1 pr-1"
              mat-cell
            >
              <img
                [src]="row['imageSrc']"
                class="avatar h-8 w-8 align-middle"
                alt=""
              />
            </td>
          </ng-container>

          <!-- View Map -->
          <ng-container matColumnDef="viewMap">
            <th
              *matHeaderCellDef
              class="uppercase pl-1 pr-1"
              mat-header-cell
              mat-sort-header
            ></th>
            <td
              *matCellDef="let row"
              class="pl-1 pr-1"
              mat-cell
            >
              <div class="flex">
                <button
                  (click)="openGeographicViewerMain(row)"
                  class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-green-600 bg-green-600/10"
                  mat-icon-button
                  title="Ver Mapa"
                >
                  <mat-icon
                    class="icon-sm"
                    svgIcon="mat:map"
                  ></mat-icon>
                </button>

                <button
                  (click)="openCadastralInformationProperty(row)"
                  class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-teal-600 bg-teal/10"
                  mat-icon-button
                  title="Consultar información predial"
                >
                  <mat-icon
                    class="icon-sm"
                    svgIcon="mat:info"
                  ></mat-icon>
                </button>

                <button
                  (click)="initiateFilingProcedure(row)"
                  class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-primary-600 bg-primary-600/10"
                  mat-icon-button
                  title="Radicar"
                >
                  <mat-icon
                    class="icon-sm"
                    svgIcon="mat:add"
                  ></mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <!-- Text Columns -->
          <ng-container
            *ngFor="let column of columns; trackBy: trackByProperty"
          >
            <ng-container
              *ngIf="column.type === 'text'"
              [matColumnDef]="column.property"
            >
              <th
                *matHeaderCellDef
                class="uppercase pl-1 pr-1"
                mat-header-cell
                mat-sort-header
              >
                {{ column.label }}
              </th>
              <td
                *matCellDef="let row"
                [ngClass]="column.cssClasses"
                mat-cell
                class="pl-1 pr-1"
              >
                {{ row[column.property] }}
              </td>
            </ng-container>
          </ng-container>

          <!-- Action Column -->
          <!-- <ng-container matColumnDef="actions">
            <th
              *matHeaderCellDef
              mat-header-cell
              mat-sort-header
              class="pl-1 pr-1"
            ></th>
            <td
              *matCellDef="let row"
              class="w-10 text-secondary pl-1 pr-1"
              mat-cell
            >
              <button
                (click)="$event.stopPropagation()"
                [matMenuTriggerData]="{ customer: row }"
                [matMenuTriggerFor]="actionsMenu"
                mat-icon-button
                type="button"
              >
                <mat-icon svgIcon="mat:more_horiz"></mat-icon>
              </button>
            </td>
          </ng-container> -->

          <tr
            *matHeaderRowDef="visibleColumns"
            mat-header-row
          ></tr>
          <tr
            *matRowDef="let row; columns: visibleColumns"
            @fadeInUp
            class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
            mat-row
          ></tr>
        </table>
        <div
          *ngIf="
            dataSource.data.length <= 0 || dataSource.filteredData.length <= 0
          "
          class="no-data-information"
        >
          No hay información disponible
        </div>
        <mat-paginator
          #paginator
          [pageSizeOptions]="pageSizeOptions"
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageIndex]="page"
          class="sticky left-0"
          (page)="refreshInformationPaginator($event)"
        ></mat-paginator>
      </div>

      <!-- <mat-menu
        #columnFilterMenu="matMenu"
        xPosition="before"
        yPosition="below"
      >
        <button
          (click)="toggleColumnVisibility(column, $event)"
          *ngFor="let column of columns"
          class="mat-menu-item block"
        >
          <mat-checkbox
            (click)="$event.stopPropagation()"
            [(ngModel)]="column.visible"
            color="primary"
          >
            {{ column.label }}
          </mat-checkbox>
        </button>
      </mat-menu> -->

      <!-- <mat-menu
        #actionsMenu="matMenu"
        xPosition="before"
        yPosition="below"
      >
        <ng-template
          let-customer="customer"
          matMenuContent
        >
          <button mat-menu-item>
            <mat-icon svgIcon="mat:delete"></mat-icon>
            <span>Delete</span>
          </button>
        </ng-template>
      </mat-menu> -->
    </mat-panel-description>
    }
  </mat-expansion-panel>
</mat-accordion>
