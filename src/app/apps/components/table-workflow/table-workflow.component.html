<vex-page-layout>
    <vex-page-layout-content class="px-5 -mt-6">
        <div class="card overflow-auto -mt-16">
    
            <div class="bg/app/bar px-4 h-16 border-b sticky left-0 flex items-center">
                <span class="flex-1"></span>
                <!-- campo de búsqueda -->
                <mat-form-field subscriptSizing="dynamic" class="pl-1 pr-1 pt-6 pb-6 flex flex-col">
                    <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
                    <input
                        matInput
                        [formControl]="searchCtrl"
                        placeholder="Buscar dominio&hellip;"
                        type="text"/>
                </mat-form-field>
    
                <!-- Botón de filtro -->
                <button
                    [matMenuTriggerFor]="columnFilterMenu"
                    mat-icon-button
                    matTooltip="Filter Columns"
                    type="button"
                    class="ml-4 flex-col">
                    <mat-icon svgIcon="mat:filter_list"></mat-icon>
                </button>
            </div>

            <!-- Tabla de dominios -->
            <table @stagger mat-table [dataSource]="dataSource" class="w-full " matSort>
                <ng-container matColumnDef="icon">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let row">
                        <mat-icon svgIcon="mat:insert_drive_file"></mat-icon>
                    </td>
                </ng-container>
                
                <!-- Text Columns -->
                <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
                    <ng-container *ngIf="column.type === 'text'" [matColumnDef]="column.property">
                        <th *matHeaderCellDef class="uppercase" mat-header-cell mat-sort-header>
                            {{ column.label }}
                        </th>
                        <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                            {{ row[column.property] }}
                        </td>
                    </ng-container>
                </ng-container>
            
                <tr mat-header-row *matHeaderRowDef="visibleColumns"></tr>
                <tr mat-row *matRowDef="let element; columns: visibleColumns;" @fadeInUp class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"></tr>
            </table>

            <!-- Paginador -->
            <mat-paginator
                #paginator
                [class.hidden]="!(isDesktop$ | async)"
                [pageSizeOptions]="pageSizeOptions"
                [length]="totalElements"
                [pageSize]="pageSize"
                [pageIndex]="page"
                (page)="refreshInformationpaginator($event)"
                class="sticky left-0 flex flex-col">
            </mat-paginator>
    
        </div>
    </vex-page-layout-content>
</vex-page-layout>
    
<mat-menu #columnFilterMenu="matMenu" xPosition="before" yPosition="below">
    <button
        (click)="toggleColumnVisibility(column, $event)"
        *ngFor="let column of columns"
        class="mat-menu-item block">
        <mat-checkbox
            (click)="$event.stopPropagation()"
            [(ngModel)]="column.visible"
            color="primary">
            {{ column.label }}
        </mat-checkbox>
    </button>
</mat-menu>
