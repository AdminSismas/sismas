<div class="flex items-center" mat-dialog-title>
  <button
    class="text-secondary"
    mat-dialog-close
    mat-icon-button
    type="button">
    <mat-icon svgIcon="mat:close"></mat-icon>
  </button>
</div>
<mat-divider class="text-border opacity-0"></mat-divider>

<form #postForm id="postForm" action="" method="POST" target="_blank">
  <mat-dialog-content class="flex flex-col overflow-hidden">
    <vex-page-layout class="overflow-hidden">
      <vex-page-layout-content class="container-fluid p-0 overflow-hidden opacity-0">
        <div class="flex flex-col sm:flex-row">
          <input type="text" id="page" name="page" value="../../#/viewer/config" />
          <input type="text" id="map" name="map" value="" />
          <input type="text" id="featureinfo" name="featureinfo" value="" />
          <input type="text" id="bbox" name="bbox" value="" />
          <input type="text" id="center" name="center" value="" />
          <input type="text" id="zoom" name="zoom" value="30" />
          <textarea id="actions" name="actions"></textarea>
        </div>
      </vex-page-layout-content>
    </vex-page-layout>
  </mat-dialog-content>
</form>

<swal
  #ErrorMap
  title="Error"
  icon="error"
  text="No se pudo cargar el mapa"
  [showConfirmButton]="false"
  [timer]="1000"
></swal>
