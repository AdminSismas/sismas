<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración','Trámites catastrales', 'Grupos de trabajo']"
    class="flex-auto"></vex-breadcrumbs>

  <button class="ml-2" color="primary" mat-icon-button type="button">
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>


<div class="mat-content">
  <div class="block">
    <div class="w-full">
      <mat-card>

        <!-- Barra superior con el botón de "Nuevo" y el buscador -->
        <mat-card-header>

          <div class="flex items-center gap-4">
            @if (canModifyWorkGroup()) {
              <!-- Botón "Nuevo grupo de trabajo" -->
              <button
                class="bg-primary-500 text-white font-medium px-4 rounded h-10 flex items-center"
                (click)="openDialog()"
              >
                Nuevo grupo de trabajo
              </button>
            }


            <!-- Campo de búsqueda -->
            <div class="flex items-center border border-gray-300 rounded px-2 h-10">
              <input
                type="text"
                (input)="onSearchChange($event)"
                class="focus:outline-none text-sm w-full h-full px-2"
              />
            </div>

            <!-- Botón "Buscar" -->
            <!-- <button
              class="bg-primary-500 text-white font-medium px-4 rounded h-10"
              (click)="onSearchChange()"
            >
              Buscar
            </button> -->

          </div>
        </mat-card-header>

        <!-- Contenido de la tabla -->
        <mat-card-content>
          <div class="overflow-x-auto">
            <table mat-table [dataSource]="dataSource" class="w-full">
              <!-- Nombre Columna -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef><strong>Nombre</strong></th>
                <td mat-cell *matCellDef="let element">{{ element.name }}</td>
              </ng-container>

              <!-- Descripción Columna -->
              <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef><strong>Descripción</strong></th>
                <td mat-cell *matCellDef="let element">{{ element.description }}</td>
              </ng-container>

              <!-- Acciones Columna -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef><strong>Acciones</strong></th>
                <td mat-cell *matCellDef="let element">
                  <button
                  mat-icon-button
                  color="primary"
                  type="button"
                  [matMenuTriggerData]="{ row: element }"
                  [matMenuTriggerFor]="actionsMenu"
                >
                  <mat-icon svgIcon="mat:more_horiz"></mat-icon>
                </button>
                </td>
              </ng-container>

              <!-- Filas de la tabla -->
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
          </div>
        </mat-card-content>

        <!-- Paginador -->
        <mat-paginator
          [pageSizeOptions]="pageSizeOptions"
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageIndex]="page"
          (page)="onPageChange($event)">
        </mat-paginator>
        <mat-menu
        #actionsMenu="matMenu"
        xPosition="before"
        yPosition="below"
      >
        <ng-template
          let-row="row"
          matMenuContent
        >
          @for (action of actionBtns(); track action.name) {
            <button
              (click)="actionMenuHandler(action.name, row)"
              mat-menu-item
            >
              <mat-icon svgIcon="{{ action.icon }}"></mat-icon>
              {{ action.label }}
            </button>
          }
        </ng-template>
      </mat-menu>
      </mat-card>
    </div>
  </div>
</div>
