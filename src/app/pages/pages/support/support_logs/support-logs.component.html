<vex-page-layout-content class="container">
    <div class="card overflow-auto">
      <!-- Header with Search and Filter -->
      <div class="bg-app-bar px-6 h-16 border-b flex items-center">
        <mat-form-field subscriptSizing="dynamic">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input
            matInput
            [formControl]="searchCtrl"
            placeholder="Buscar&hellip;"
            type="text" />
        </mat-form-field>
      </div>
  
      <!-- Data Table -->
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- Checkbox Column -->
        <!-- <ng-container matColumnDef="checkbox">
          <th mat-header-cell *matHeaderCellDef>
            <mat-checkbox
              (change)="masterToggle()"
              [checked]="isAllSelected()"
              [indeterminate]="selection.hasValue() && !isAllSelected()">
            </mat-checkbox>
          </th>
          <td mat-cell *matCellDef="let row">
            <mat-checkbox
              (click)="$event.stopPropagation()"
              (change)="selection.toggle(row)"
              [checked]="selection.isSelected(row)">
            </mat-checkbox>
          </td>
        </ng-container> -->
  
        <!-- ID Column -->
        <ng-container matColumnDef="No.Ticket">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>No. Ticket</th>
          <td mat-cell *matCellDef="let row">{{ row.number }}</td>
        </ng-container>
  
        <!-- Title Column -->
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>TÍTULO</th>
          <td mat-cell *matCellDef="let row">{{ row.title }}</td>
        </ng-container>
  
        <!-- Priority Column -->
        <ng-container matColumnDef="priorityId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>PRIORIDAD</th>
            <td mat-cell *matCellDef="let row">
              <span [ngClass]="getPriorityClass(row.priority_id)">{{ getPriorityText(row.priority_id) }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>CREACIÓN</th>
            <td mat-cell *matCellDef="let row">{{ row.created_at | date: "dd/MM/yyyy hh:mm:ss a" }}</td>
          </ng-container>

          <ng-container matColumnDef="updatedAt">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ACTUALIZACIÓN</th>
            <td mat-cell *matCellDef="let row">{{ row.last_owner_update_at | date: "dd/MM/yyyy hh:mm:ss a" }}</td>
          </ng-container>


  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
  
      <!-- Paginator -->
      <mat-paginator
        [pageSizeOptions]="[5, 10, 20]"
        [pageSize]="5">
      </mat-paginator>
    </div>
  </vex-page-layout-content>
