<div class="card overflow-hidden min-h-64 bg-white shadow-md rounded-lg">
    <!-- Tarjeta con sombra y bordes redondeados -->
    <div (click)="openCertificate.emit(certificate.id)"
      class="p-4 text-center hover:bg-gray-200 transition duration-300 ease-in-out cursor-pointer relative" matRipple>
      <div
        class="w-24 h-24 mx-auto rounded-full overflow-hidden border-2 border-gray-300 bg-white flex justify-center items-center">
        <mat-icon svgIcon="{{certificate.icon}}"></mat-icon>
      </div>
      <h2 class="title mb-1 mt-3 truncate break-word" [ngClass]="{'text-gray-300': !certificate.name}">
        {{ certificate.name || 'Sin nombre' }}
      </h2>
    </div>
    <div class="bg-app-bar p-2 flex items-center justify-around">
      <div class="py-3 flex items-center max-w-xs">
        <div>
          <p class="m-0 caption text-hint overflow-hidden truncate">Precio</p>
          <p class="m-0 body-1 overflow-hidden truncate"> {{ certificate.price | currencyFormat }}</p>
        </div>
      </div>
     
    
    </div>
  </div>
