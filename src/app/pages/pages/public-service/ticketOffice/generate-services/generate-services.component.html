<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Servicio público','Taquilla', 'Generar servicios']"
    class="flex-auto"></vex-breadcrumbs>

  <button class="ml-2" color="primary" mat-icon-button type="button">
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>

<mat-tab-group>
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon svgIcon="mat:description"></mat-icon>
      Generar certificado
    </ng-template>
    <ng-template matTabContent>
      <vex-certificate-grid></vex-certificate-grid>
    </ng-template>
  </mat-tab>
  <mat-tab>
    <ng-template mat-tab-label>
      <mat-icon svgIcon="mat:content_paste_search"></mat-icon>
      Estados certificados
    </ng-template>
    <ng-template matTabContent>
      <procedure-state-table></procedure-state-table>
    </ng-template>
  </mat-tab>
</mat-tab-group>
