<div class="chat-container relative h-full flex flex-col overflow-hidden">
  <!-- Overlay para aplicar transparencia -->
  <div class="chat-overlay"></div>

  <!-- Contenido del chat -->
  <div class="chat-content flex flex-col h-full">
    <div class="px-6 bg-foreground border-b h-16 flex-none flex items-center">
      <button (click)="openDrawer()" class="md:hidden sm:-ml-4 mr-2" mat-icon-button type="button">
        <mat-icon>menu</mat-icon>
      </button>
      <div class="flex items-center gap-3">
        <img class="hidden sm:block flex-none w-9 h-9 rounded-full" [src]="chat?.imageUrl" alt="Chat Image" />
        <div class="flex-1 truncate">
          <div class="font-semibold text-sm truncate">{{ chat?.name }}</div>
          <div class="flex items-center gap-1 truncate">
            <div class="h-1.5 w-1.5 rounded-full bg-green-600"></div>
            <div class="text-xs text-gray-600 dark:text-gray-400 truncate">En línea</div>
          </div>
        </div>
      </div>

      <span class="flex-1"></span>

      <div class="flex-none flex items-center gap-1 mr-1">
        <button mat-icon-button type="button" (click)="toggleRecording()">
          <mat-icon>{{ isRecording ? 'stop' : 'mic' }}</mat-icon>
        </button>
        <button mat-icon-button type="button" (click)="toggleSound()">
          <mat-icon>{{ isSoundOn ? 'volume_up' : 'volume_off' }}</mat-icon>
        </button>
      </div>
    </div>

    <vex-scrollbar class="flex-1">
      <div class="flex flex-col space-y-2 p-8 justify-end">
        <div *ngFor="let message of messages; trackBy: trackById">
          <div
            [ngClass]="{'flex gap-2 self-end': message.from === 'me', 'flex gap-2 self-start': message.from !== 'me'}">
            <img *ngIf="message.from !== 'me'" class="w-8 h-8 rounded-full self-end" [src]="chat?.imageUrl"
              alt="Chat Image" />
            <div class="flex flex-col space-y-2">
              <div *ngIf="message.from === 'me'"
                class="message-container-me px-4 py-3 rounded-xl bg-primary-600 text-white inline-flex self-end max-w-[350px]">
                <span [innerHTML]="message.text"></span>
                <div class="timestamp text-xs font-medium text-gray-300 mt-1">{{ message.timestamp }}</div>
              </div>
              <div *ngIf="message.from !== 'me'"
                class="message-container-other px-4 py-3 rounded-xl bg-gray-200 dark:bg-gray-800 inline-flex self-start max-w-[350px]">
                <ng-container *ngIf="message.isButton; else defaultMessage">
                  <button class="btn btn-primary" (click)="handlePqrClick()">PQR</button>
                </ng-container>
                <ng-template #defaultMessage>
                  <span [innerHTML]="message.text"></span>
                </ng-template>
                <div class="timestamp text-xs font-medium text-gray-600 dark:text-gray-400 mt-1">{{ message.timestamp }}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Iframe oculto para BI -->
        <iframe *ngIf="biUrl" [src]="biUrl" class="w-full h-64 mt-4"></iframe>

        <!-- Animación de carga -->
        <div *ngIf="isLoading" class="flex gap-2 self-start items-center">
          <img class="w-8 h-8 rounded-full" [src]="chat?.imageUrl" alt="Chat Image" />
          <div class="flex flex-col space-y-2">
            <div class="px-4 py-3 rounded-xl bg-gray-200 dark:bg-gray-800 inline-flex self-start max-w-[350px]">
              <div class="loading-dots">
                <span></span><span></span><span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </vex-scrollbar>

    <div class="flex-none bg-foreground border-t">
      <div class="relative h-16 flex items-center justify-between">
        <button class="z-10 ml-4" color="primary" mat-mini-fab type="button">
          <mat-icon>add</mat-icon>
        </button>

        <mat-menu #addMenuButton="matMenu" xPosition="after" yPosition="above">
          <button mat-menu-item>
            <mat-icon>attach_file</mat-icon>
            <span>Upload File</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item>
            <mat-icon>text_snippet</mat-icon>
            <span>Create Text Snippet</span>
          </button>
          <button mat-menu-item>
            <mat-icon>draw</mat-icon>
            <span>Start Drawing Canvas</span>
          </button>
          <button mat-menu-item>
            <mat-icon>event</mat-icon>
            <span>Schedule Meeting</span>
          </button>
        </mat-menu>

        <input
          class="z-0 absolute top-0 right-0 bottom-0 left-0 h-full w-full border-0 focus:border-0 px-20 bg-transparent"
          placeholder="Escribe tu mensaje ..." type="text" [ngModel]="!!newMessage" (ngModelChange)="newMessage = $event" [disabled]="isInputDisabled" (keydown)="onKeydown($event)" />

        <button class="relative z-10 mr-4" mat-icon-button type="button" (click)="sendMessage()">
          <mat-icon>send</mat-icon>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Template de la modal -->
<ng-template #settingsDialog>
  <h2 mat-dialog-title>Configuraciones</h2>
  <mat-dialog-content class="modal-content">
    <mat-tab-group>
      <mat-tab label="Instrucciones">
        <div>
          <!-- Contenido de instrucciones -->
        </div>
      </mat-tab>
      <mat-tab label="Parámetros">
        <div>
          <!-- Contenido de parámetros -->
        </div>
      </mat-tab>
    </mat-tab-group>
  </mat-dialog-content>
  <mat-dialog-actions class="modal-actions">
    <button mat-button (click)="closeDialog()">Cerrar</button>
  </mat-dialog-actions>
</ng-template>
