<vex-page-layout>
  <vex-page-layout-header
    class="pb-4 flex flex-col items-start justify-center">
    <div
      class="w-full flex flex-col sm:flex-row justify-between px-6">
      <div>
        <h1 class="title mt-0 mb-1">Búsqueda catastral datos abiertos</h1>
        <vex-breadcrumbs
          [crumbs]="['Mi trabajo', 'Búsqueda catastral datos abiertos']">
        </vex-breadcrumbs>
      </div>
    </div>
  </vex-page-layout-header>
  <vex-page-layout-content class="-mt-2 px-5" >
    <div class="card overflow-auto -mt-12 mat-elevation-z5">
      <div
        class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center">
        <button
          class="rounded-full py-2 px-6 title"
          color="primary"
          mat-button
          (click)="createAdvancedSearch()"
          type="button">
          <mat-icon
            class="ltr:-ml-2 rtl:-mr-2 ltr:mr-2 rtl:ml-2 !icon-lg"
            svgIcon="mat:search"></mat-icon>
          <span>Búsqueda avanzada DA</span>
        </button>
        <span class="flex-1"></span>
        <mat-form-field subscriptSizing="dynamic" class=" pl-1 pr-1 pt-6 pb-6 flex flex-col">
          <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
          <input
            matInput
            [formControl]="searchCtrl"
            placeholder="Search basic&hellip;"
            type="text" />
        </mat-form-field>
        <!-- <button
          [matMenuTriggerFor]="columnFilterMenu"
          class="ml-4 flex-none"
          mat-icon-button
          matTooltip="Filter Columns"
          type="button">
          <mat-icon svgIcon="mat:filter_list"></mat-icon>
        </button> -->
      </div>
      <table
        @stagger
        [dataSource]="dataSource"
        class="w-full"
        mat-table
        matSort>

        <!-- Checkbox Column -->
        <ng-container matColumnDef="checkbox">
          <th *matHeaderCellDef mat-header-cell
              class="pl-1 pr-1">
            <mat-checkbox
              (change)="$event ? masterToggle() : null"
              [checked]="selection.hasValue() && isAllSelected()"
              [indeterminate]="selection.hasValue() && !isAllSelected()"
              color="primary">
            </mat-checkbox>
          </th>
          <td *matCellDef="let row" class="w-4 pl-1 pr-1" mat-cell>
            <mat-checkbox
              (change)="$event ? selection.toggle(row) : null"
              (click)="$event.stopPropagation()"
              [checked]="selection.isSelected(row)"
              color="primary">
            </mat-checkbox>
          </td>
        </ng-container>

        <!-- Image Column -->
        <ng-container matColumnDef="image">
          <th *matHeaderCellDef mat-header-cell class="pl-1 pr-1"></th>
          <td *matCellDef="let row" class="w-8 min-w-8 pl-1 pr-1" mat-cell>
            <img [src]="row['imageSrc']" class="avatar h-8 w-8 align-middle" alt="" />
          </td>
        </ng-container>

        <!-- View Map -->
        <ng-container matColumnDef="viewMap">
          <th
            *matHeaderCellDef
            class="uppercase pl-1 pr-1"
            mat-header-cell
            mat-sort-header>
          </th>
          <td *matCellDef="let row"
              class="pl-1 pr-1"
              mat-cell>
            <div class="flex">
              <button
                (click)="openGeographicViewerMain(row)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-green-600 bg-green-600/10"
                mat-icon-button title="Ver Mapa">
                <mat-icon class="icon-sm" svgIcon="mat:map"></mat-icon>
              </button>

              <button
                (click)="openCadastralInformationProperty(row)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-teal-600 bg-teal/10"
                mat-icon-button title="Consultar información predial">
                <mat-icon class="icon-sm" svgIcon="mat:info"></mat-icon>
              </button>

              <button
                (click)="initiateFilingProcedure(row)"
                class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-primary-600 bg-primary-600/10"
                mat-icon-button title="Radicar">
                <mat-icon class="icon-sm" svgIcon="mat:add"></mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <!-- Text Columns -->
        <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
          <ng-container
            *ngIf="column.type === 'text'"
            [matColumnDef]="column.property">
            <th
              *matHeaderCellDef
              class="uppercase pl-1 pr-1"
              mat-header-cell
              mat-sort-header>
              {{ column.label }}
            </th>
            <td *matCellDef="let row"
                [ngClass]="column.cssClasses"
                mat-cell
                class="pl-1 pr-1">
              {{ row[column.property] }}
            </td>
          </ng-container>
        </ng-container>

        <!-- Action Column -->
        <!-- <ng-container matColumnDef="actions">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="pl-1 pr-1"></th>
          <td *matCellDef="let row" class="w-10 text-secondary pl-1 pr-1" mat-cell>
            <button
              (click)="$event.stopPropagation()"
              [matMenuTriggerData]="{ customer: row }"
              [matMenuTriggerFor]="actionsMenu"
              mat-icon-button
              type="button">
              <mat-icon svgIcon="mat:more_horiz"></mat-icon>
            </button>
          </td>
        </ng-container> -->

        <tr *matHeaderRowDef="visibleColumns"
            mat-header-row></tr>
        <tr
          *matRowDef="let row; columns: visibleColumns"
          @fadeInUp
          class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
          mat-row></tr>
      </table>
      <div *ngIf="dataSource.data.length <= 0 || dataSource.filteredData.length <= 0" class="no-data-information">
        No hay información disponible
      </div>
      <mat-paginator
        #paginator
        [pageSizeOptions]="pageSizeOptions"
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="page"
        (page)="refreshInformationPaginator($event)"
        class="sticky left-0"></mat-paginator>
    </div>
  </vex-page-layout-content>
</vex-page-layout>
