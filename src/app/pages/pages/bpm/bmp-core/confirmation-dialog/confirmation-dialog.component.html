<h2 mat-dialog-title><strong>Confirmación</strong></h2>
<mat-dialog-content class="py-4 px-6 text-gray-600">
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions class="flex justify-end gap-3 p-4">
  <button mat-raised-button class="bg-gray-200 text-gray-700 hover:bg-gray-300 px-4 py-2 rounded-md" (click)="close(false)">
    Cancelar
  </button>
  <button mat-raised-button color="primary" class="bg-blue-600 text-white hover:bg-blue-700 px-4 py-2 rounded-md" (click)="close(true)">
    Aceptar
  </button>
</mat-dialog-actions>
