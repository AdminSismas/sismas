<div class="w-full h-full flex flex-col h-content-body-bpm">
  <vex-header-bpm-core
    idHeader="bpm-coreID"
    [executionId]="executionId$ | async"
    [proTaskE]="_infoProTaskE$ | async"
    [components]="components$ | async"
    [resources]="resources"
    icon="mat:contacts"
    (returnPanelTask)="returnPanelTask($event)">
  </vex-header-bpm-core>

  <div class="h-full flex flex-col" vexFluidHeight fluidHeight=140>
    <div @stagger class="overflow-y-auto flex-auto">
      @for (comp of components$ | async; track comp) {
        <ng-container>
          <ng-container
            [ngComponentOutlet]="comp.component"
            [ngComponentOutletInjector]="comp.componentData"
            [ngComponentOutletInputs]="comp.inputs"
          ></ng-container>
        </ng-container>
      }
    </div>
  </div>
</div>
<!-- style="padding-right: 262px" -->
<div class="vex-footer vex-footer-task w-full p-0 h-16 bg-white fixed bottom-0 left-0" style="padding-left: 278px;">
  <div class="w-full max-w-4xl p-4 flex items-center justify-center gap-4 mx-auto" style="padding-left: 278px;">
    <button color="warn" mat-raised-button type="button"
            class="grow max-w-xs"
            (click)="onReject()">
      Rechazar
    </button>
    <button
      [ngClass]="['!bg-green-600','!text-white']"
      mat-raised-button type="button"
      class="grow max-w-xs"
      (click)="onAccept()">
      Aceptar
    </button>
  </div>
</div>
<!-- </div> -->

<!-- Full Screen Loading Overlay for Accept Process -->
@if (isAcceptLoading()) {
  <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[9999]">
    <div class="bg-white rounded-lg p-6 flex flex-col items-center shadow-2xl">
      <mat-spinner diameter="50"></mat-spinner>
      <h3 class="mt-4 text-lg font-medium text-gray-900">
        Procesando tarea...
      </h3>
      <p class="mt-2 text-sm text-gray-500">
        Por favor espere mientras se valida y procesa la información
      </p>
    </div>
  </div>
}
