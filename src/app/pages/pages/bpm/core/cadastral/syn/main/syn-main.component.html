<!-- src\assets\img\illustrations\checklist.svg -->
<main class="h-full flex flex-col items-center justify-center gap-8">
  <img
    src="../../../../../../../../assets/img/illustrations/checklist.svg"
    alt="checklist"
    class="h-1/2"
  />
  <h1 class="text-center text-2xl">¿Está seguro de sincronizar los cambios?</h1>
  @if (loading) {
    <mat-spinner diameter="40"></mat-spinner>
  } @else {
    <button
      mat-raised-button
      color="primary"
      class="text-lg p-5"
      (click)="syncChanges()"
    >
      Sincronizar cambios
    </button>
  }
</main>
