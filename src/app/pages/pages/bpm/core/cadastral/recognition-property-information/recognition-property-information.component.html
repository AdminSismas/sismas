<vex-page-layout [id]="this.id" mode="card" class="px-3 py-3">
  <vex-page-layout-content class="card w-full h-full">
    <div class="container-fluid p-0" vexMinFluidHeight [fluidHeight]="mode === 3 ? 200: fluidHeight"
         [overflowY]="'hidden'">
      <div
        class="container px-[1rem] py-0 w-full h-full flex flex-col overflow-hidden overflow-y-hidden overflow-x-hidden">
        <vex-dynamic-forms [inputs]="inputFormVisit" [initValues]="initRecognitionProperty()"
                           (formReady)="form.set($event)"
                           className="grid grid-cols-2 gap-4 sm:grip-row overflow-hidden items-start"
                           class="w-full pt-4"></vex-dynamic-forms>
      </div>
      <div class="container w-full h-full flex flex-col overflow-hidden overflow-y-hidden overflow-x-hidden">
        <vex-table-third-party-affected
          [executionId]="executionId"
          [readOnly]="true">
        </vex-table-third-party-affected>
        <div class="w-full max-w-4xl p-4 flex items-center justify-center text-center gap-4 mx-auto mt-2">
          <button mat-raised-button class="grow max-w-xs px-6 py-5" color="primary" (click)="saveForm()">
            <mat-icon svgIcon="mat:save" class="!w-6 !h-6"></mat-icon>
            Guardar
          </button>
        </div>
      </div>
    </div>
  </vex-page-layout-content>
</vex-page-layout>

<swal #invalidForm title="Formulario vacío" text="Se debe diligenciar al menos un campo del formulario." icon="error"
      confirmButtonText="Cerrar" confirmButtonColor="#3085d6"></swal>

<swal #successSave title="Reconocimiento predial exitoso" text="Se ha guardo la información del reconocimiento predial"
      icon="success" confirmButtonText="Aceptar" confirmButtonColor="#3085d6"></swal>
