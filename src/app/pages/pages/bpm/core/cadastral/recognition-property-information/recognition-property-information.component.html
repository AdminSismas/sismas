<vex-page-layout [id]="this.id" mode="card" class="px-[4rem] py-3">
  <vex-page-layout-content class="card w-full h-full">
    <div class="container w-full h-full flex flex-col"
         vexMinFluidHeight [fluidHeight]="mode === 3 ? 230: fluidHeight">
      <vex-dynamic-forms
        [inputs]="inputFormVisit"
        [initValues]="initRecognitionProperty()"
        (formReady)="form.set($event)"
        className="flex sm:flex-col overflow-hidden items-start"
        class="w-full py-4"
      ></vex-dynamic-forms>

      @if (dataSource.data.length > 0) {
        <h2 class="title mt-6 mb-4 flex items-center">
      <span
        @scaleIn
        class="w-10 h-10 rounded-full text-primary-600 mr-3 flex items-center justify-center bg-primary-600/10"
      >
        <mat-icon
          class="icon-sm"
          svgIcon="mat:vertical_split"
        ></mat-icon>
      </span>
          <span class="block"> Participantes </span>
        </h2>
        <table
          @stagger
          [dataSource]="dataSource"
          class="w-full"
          mat-table
          matSort
        >
          @for (column of columns; track column.property) {
            <ng-container [matColumnDef]="column.property">
              <th
                *matHeaderCellDef
                mat-header-cell
                class="!bg-slate-300 !py-2"
              >
                {{ column.label }}
              </th>
              <td
                *matCellDef="let row"
                mat-cell
              >
                {{ row[column.property] }}
              </td>
            </ng-container>
          }
          <tr
            mat-header-row
            *matHeaderRowDef="visibleColumns"
          ></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: visibleColumns"
            @fadeInUp
          ></tr>
        </table>
      }
    </div>
  </vex-page-layout-content>
</vex-page-layout>
<div class="vex-footer vex-footer-task w-100 p-0 items-center justify-center text-center">
  <button
    mat-raised-button
    class="grow max-w-xs px-6 py-5"
    color="primary"
    (click)="saveForm()">
    <mat-icon svgIcon="mat:save" class="!w-6 !h-6"></mat-icon>
    Guardar
  </button>
</div>

<swal
  #invalidForm
  title="Formulario vacío"
  text="Se debe diligenciar al menos un campo del formulario."
  icon="error"
  confirmButtonText="Cerrar"
  confirmButtonColor="#3085d6"
></swal>

<swal
  #successSave
  title="Reconocimiento predial exitoso"
  text="Se ha guardo la información del reconocimiento predial"
  icon="success"
  confirmButtonText="Aceptar"
  confirmButtonColor="#3085d6"
></swal>
