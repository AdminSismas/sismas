<vex-page-layout
  [id]="this.id"
  mode="card"
  class="pb-0"
  *ngIf="isExistDataInformations$ | async"
>

  <vex-page-layout-content class="container-fluid px-1 py-1">
    <mat-tab-group class="overflow-hidden" dynamicHeight
                   animationDuration="500ms" preserveContent>

      <!-- Mapa Geografico -->
      <mat-tab label="Mapa Geografico">
        <div class="h-full flex flex-col container-fluid xl:px-1 xl:py-1 sm:px-3 sm:py-3" vexFluidHeight
             fluidHeight=220>
          <vex-geographic-viewer-embedded
            [idComponent]="id + 'vexGeographicViewerEmbeddedGeoTemporal'"
            [executionId]="executionIdGeo"
            [schema]="schema"
            vexFluidHeight fluidHeight=215
          ></vex-geographic-viewer-embedded>
        </div>
      </mat-tab>

      <!-- Informacion alfanumerica -->
      <mat-tab label="Información Alfanumérica">
        <vex-alfa-main
          [executionId]="executionId"
          [resources]="[]"
          [mode]="mode"
        ></vex-alfa-main>
      </mat-tab>

    </mat-tab-group>

  </vex-page-layout-content>

</vex-page-layout>

<vex-loading-app
  *ngIf="(isExistDataInformations$ | async) === false"
  #vexSplashScreen
  idLoading="vexSplashScreen"
  [showImage]="true"
>
</vex-loading-app>
