<div class="bg-app-bar mt-4 px-4 h-16 border-b sticky left-0 flex items-center">

  <button
  color="primary"
  mat-raised-button
  type="button"
  (click)="onClickOpenAddAttachmentModal()"
>
  Nuevo
  <mat-icon svgIcon="mat:add"></mat-icon>
</button>


    <span class="flex-1"></span>

    <!-- Search -->
    <mat-form-field subscriptSizing="dynamic" class="pl-1 pr-1 pt-6 pb-6 flex flex-col">
      <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
      <input matInput [formControl]="searchCtrl" placeholder="Buscar archivo…" type="text" />
    </mat-form-field>
  
    <!-- button filter -->
    <button
      [matMenuTriggerFor]="columnFilterMenu"
      mat-icon-button
      matTooltip="Filtrar Columnas"
      type="button"
      class="ml-4 flex-col"
    >
      <mat-icon matIconPrefix svgIcon="mat:filter_list"></mat-icon>
    </button>
  </div>
  
  <!-- Table -->
  <table @stagger mat-table [dataSource]="dataSource" class="w-full" matSort>

    <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef class="w-12"></th>
        <td mat-cell *matCellDef="let row" class="w-12 text-center">
          <button
            mat-icon-button
            matTooltip="Ver archivo"
            (click)="viewFile(row)"
          >
            <mat-icon svgIcon="mat:visibility"></mat-icon>
          </button>
        </td>
      </ng-container>
      

  
    <!-- Text Columns -->
    <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
      <ng-container *ngIf="column.type === 'text'" [matColumnDef]="column.property">
        <th *matHeaderCellDef class="uppercase pl-1 pr-1" mat-header-cell mat-sort-header>
          {{ column.label }}
        </th>
        <td
          *matCellDef="let row"
          (click)="viewFile(row)"
          class="uppeercase pl-1 pr-1"
          [ngClass]="column.cssClasses"
          mat-cell
        >
          <mat-icon
            matIconPrefix
            *ngIf="column.property === 'originalFileName'"
            svgIcon="mat:picture_as_pdf"
            class="w-5 h-5 p-0 items-center justify-center text-red-600"
          ></mat-icon>
          {{ row[column.property] }}
        </td>
      </ng-container>
  
      <ng-container *ngIf="column.type === 'date'" [matColumnDef]="column.property">
        <th *matHeaderCellDef class="uppercase pl-1 pr-1" mat-header-cell mat-sort-header>
          {{ column.label }}
        </th>
        <td
          *matCellDef="let row"
          (click)="viewFile(row)"
          class="uppeercase pl-1 pr-1"
          [ngClass]="column.cssClasses"
          mat-cell
        >
          <mat-icon
            matIconPrefix
            *ngIf="column.property === 'originalFileName'"
            svgIcon="mat:picture_as_pdf"
            class="w-5 h-5 p-0 items-center justify-center text-red-600"
          ></mat-icon>
          {{ row[column.property] | date: "dd/MM/yyyy hh:mm:ss a" }}
        </td>
      </ng-container>
    </ng-container>

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef class="w-12"></th>
      <td mat-cell *matCellDef="let row" class="w-12 text-center">
  
        <button
          mat-icon-button
          matTooltip="Eliminar archivo"
          (click)="onDelete(row)"
          class="text-red-600 hover:text-red-800 focus:outline-none"
        >
          <mat-icon svgIcon="mat:delete"></mat-icon>  
        </button>
      </td>
    </ng-container>
  
    <tr mat-header-row *matHeaderRowDef="visibleColumns"></tr>
    <tr
      mat-row
      *matRowDef="let element; columns: visibleColumns"
      @fadeInUp
      class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
    ></tr>
  </table>
  
  <!-- Paginator -->
  <mat-paginator
    *ngIf="disablePaginator == true"
    #paginator
    [class.hidden]="!(isDesktop$ | async)"
    [pageSizeOptions]="pageSizeOptions"
    [length]="totalElements"
    [pageSize]="pageSize"
    [pageIndex]="page"
    (page)="refreshInformationpaginator($event)"
    class="sticky left-0 flex flex-col"
  >
  </mat-paginator>
  
  <mat-menu #columnFilterMenu="matMenu" xPosition="before" yPosition="below">
    <button
      (click)="toggleColumnVisibility(column, $event)"
      *ngFor="let column of columns"
      class="mat-menu-item block"
    >
      <mat-checkbox (click)="$event.stopPropagation()" [(ngModel)]="column.visible" color="primary">
        {{ column.label }}
      </mat-checkbox>
    </button>
  </mat-menu>
