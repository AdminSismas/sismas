<div class="w-full h-full flex flex-col" [id]="this.id">
  <div class="px-2 pt-2 pb-4 bg-primary-600/10 flex-none">
    <div class="flex items-center container-fluid px-0">
      <button
        (click)="openMenu()"
        @scaleIn
        class="sm:hidden text-on-primary-600"
        mat-icon-button
        type="button">
        <mat-icon svgIcon="mat:menu"></mat-icon>
      </button>
      <h2
        class="display-1 font-bold m-0 flex items-center min-h-12 min-w-3xs max-w-xl mr-4">
        <span
          @scaleIn
          class="w-12 h-12 rounded-full text-primary-600 ltr:mr-4 rtl:ml-4 bg-primary-600/10 hidden sm:flex items-center justify-center">
          <mat-icon svgIcon="mat:contacts"></mat-icon>
        </span>
        <span @fadeInRight class="block">Citación, notificación y aviso</span>
      </h2>

      <div
        class="hidden sm:flex items-center bg-foreground rounded-full overflow-hidden relative ltr:pl-5 rtl:pr-5 h-12 max-w-md w-full shadow-xl mx-auto">
        <mat-icon
          class="text-secondary flex-none"
          svgIcon="mat:search"></mat-icon>
        <input
          [formControl]="searchStr"
          class="border-0 h-12 outline-none ltr:pl-4 rtl:pr-4 placeholder:text-secondary bg-foreground flex-auto"
          placeholder="Buscar Citación, notificación..."
          type="text" />
      </div>
    </div>
  </div>

  <div class="mt-1 pt-0 overflow-hidden flex-1 flex container-fluid px-0">
    <mat-drawer-container class="bg-transparent flex-auto flex">
      <mat-drawer-content class="p-6 pt-0 flex-auto flex items-start">
        <vex-citation-notice-table-menu
          [id]="executionId + 'Menu2Notificacion'"
          (filterChange)="setData($event)"
          (openAddNew)="openDetailProcessParticipant()"
          class="hidden sm:block ltr:mr-6 rtl:ml-6">
        </vex-citation-notice-table-menu>
        <div class="card h-full overflow-hidden flex-auto">
          <vex-citation-notice-grid
            [id]="executionId + 'TableNotificacionGridv2'"
            [executionId]="executionId"
            (openDetailProcessParticipant)="openDetailProcessParticipant($event)"
            (toggleStar)="toggleStar($event)"
            [typeProcess]="typeProcess"
            [searchCtrl]="searchStr$ | async">
          </vex-citation-notice-grid>
          <!--<vex-citation-notice-table
            [id]="executionId + 'TableNotificacion1R2bnv2'"
            [executionId]="executionId"
            (openDetailProcessParticipant)="openDetailProcessParticipant($event)"
            (toggleStar)="toggleStar($event)"
            [typeProcess]="typeProcess"
            [searchStr]="searchStr$ | async">
          </vex-citation-notice-table>-->
        </div>
      </mat-drawer-content>
    </mat-drawer-container>
  </div>
</div>
