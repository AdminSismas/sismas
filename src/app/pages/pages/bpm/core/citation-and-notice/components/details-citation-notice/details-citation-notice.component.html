<form [formGroup]="form">
  <div class="flex items-center" mat-dialog-title>
    <img
      [src]="'src/assets/img/avatars/1.jpg'"
      class="avatar ltr:mr-5 rtl:ml-5" />
    <h2 class="headline m-0 flex-auto">
      {{ form.controls.name.value || "New Contact" }}
    </h2>

    <button
      class="text-secondary"
      mat-dialog-close
      mat-icon-button
      type="button">
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>

  <mat-divider class="text-border"></mat-divider>

  <mat-dialog-content class="flex flex-col">
    <mat-form-field class="mt-6">
      <mat-label>Name</mat-label>
      <input cdkFocusInitial formControlName="name" matInput />

      <mat-icon matIconPrefix svgIcon="mat:person"></mat-icon>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Phone</mat-label>
      <input formControlName="phone" matInput />

      <mat-icon matIconPrefix svgIcon="mat:phone"></mat-icon>
    </mat-form-field>

    <mat-form-field>
      <mat-label>E-Mail</mat-label>
      <input formControlName="email" matInput />

      <mat-icon matIconPrefix svgIcon="mat:email"></mat-icon>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Company</mat-label>
      <input formControlName="company" matInput />

      <mat-icon matIconPrefix svgIcon="mat:business"></mat-icon>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Birthday</mat-label>
      <input
        [matDatepicker]="datepickerRef"
        formControlName="birthday"
        matInput />
      <mat-datepicker-toggle
        [for]="datepickerRef"
        class="block"
        matIconPrefix></mat-datepicker-toggle>
      <mat-datepicker #datepickerRef></mat-datepicker>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Notes</mat-label>
      <textarea formControlName="notes" matInput></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button mat-dialog-close type="button">Cancel</button>
    <button color="primary" mat-flat-button type="submit">
      <ng-container *ngIf="isEdit">Update Contact</ng-container>
      <ng-container *ngIf="!isEdit">Create Contact</ng-container>
    </button>
  </mat-dialog-actions>
</form>
