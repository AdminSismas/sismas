<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Apoyo operación', 'Personas']"
    class="flex-auto"
  ></vex-breadcrumbs>

  <button
    class="ml-2"
    color="primary"
    mat-icon-button
    type="button"
  >
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>
<div class="card pt-6">
  <form [formGroup]="form">
    <!-- Campo departamento -->
    <!-- <mat-form-field class="sm:ml-2 sm:mr-2 flex-1"> -->

    <div class="flex flex-col sm:flex-row sm:gap-4 mt-3 pt-3">
      <div
        class="form-content-item flex flex-row items-center justify-center gap-4"
        style="align-items: flex-start"
      >
        <div style="margin-left: 6px">
          <button
            *ngIf="user?.role !== 'USER_READ'"
            color="primary"
            aria-label=""
            type="button"
            mat-flat-button
            (click)="createCustomer()"
            name="crear"
            class="flex-none"
          >
            <mat-icon svgIcon="mat:add"></mat-icon>
            Nueva persona
          </button>
        </div>

        <vex-combox-colletion
          ubscriptSizing="dynamic"
          idComboCollection="typeNumberDocument"
          name="selector_document"
          label="Tipo de documento"
          typeDomainName="IndividualTypeNumber"
          placeholderDomainName="Seleccionar tipo documento"
          (selectionChange)="infoSelect($event)"
          class="flex-none"
        ></vex-combox-colletion>

        <mat-form-field class="flex-none">
          <mat-label>Número documento</mat-label>
          <input
            matInput
            [formControl]="document"
            placeholder="Número de documento"
            type="text"
            name="search"
          />
        </mat-form-field>

        <div style="margin-left: 6px">
          <button
            color="primary"
            aria-label=""
            type="button"
            mat-flat-button
            (click)="search()"
            name="enviar"
            class="flex-none"
            style="margin: 6px"
          >
            <mat-icon svgIcon="mat:search"></mat-icon>
            Buscar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>

<div
  class="mt-6 relative"
  style="padding-bottom: 56.25%; /* Relación de aspecto 16:9 */"
>
  <table
    [dataSource]="dataSource"
    class="w-full"
    mat-table
    matSort
  >
    <!--- Note that these columns can be defined in any order.
              The actual rendered columns are set as a property on the row definition" -->

    <!-- Checkbox Column -->
    <ng-container matColumnDef="checkbox">
      <th
        *matHeaderCellDef
        mat-header-cell
      >
        <mat-checkbox
          (change)="$event ? masterToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
          color="primary"
        >
        </mat-checkbox>
      </th>
      <td
        *matCellDef="let row"
        class="w-4"
        mat-cell
      >
        <mat-checkbox
          (change)="$event ? selection.toggle(row) : null"
          (click)="$event.stopPropagation()"
          [checked]="selection.isSelected(row)"
          color="primary"
        >
        </mat-checkbox>
      </td>
    </ng-container>

    <!-- Text Columns -->
    <ng-container *ngFor="let column of columns; trackBy: trackByProperty">
      <ng-container
        *ngIf="column.type === 'text'"
        [matColumnDef]="column.property"
      >
        <th
          *matHeaderCellDef
          mat-header-cell
          mat-sort-header
        >
          {{ column.label }}
        </th>
        <td
          *matCellDef="let row"
          [ngClass]="column.cssClasses"
          mat-cell
        >
          {{ row[column.property] }}
        </td>
      </ng-container>
    </ng-container>

    <!-- Action Column -->
    <ng-container matColumnDef="actions">
      <th
        *matHeaderCellDef
        mat-header-cell
        mat-sort-header
      ></th>
      <td
        *matCellDef="let row"
        class="w-10 text-secondary"
        mat-cell
      >
        <button
          *ngIf="user?.role !== 'USER_READ'"
          (click)="$event.stopPropagation()"
          [matMenuTriggerData]="{ customer: row }"
          [matMenuTriggerFor]="actionsMenu"
          mat-icon-button
          type="button"
        >
          <mat-icon svgIcon="mat:more_horiz"></mat-icon>
        </button>
      </td>
    </ng-container>

    <tr
      *matHeaderRowDef="visibleColumns"
      mat-header-row
    ></tr>
    <tr
      (click)="user?.role !== 'USER_READ' && updateCustomer(row)"
      *matRowDef="let row; columns: visibleColumns"
      class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
      mat-row
    ></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="pageSizeOptions"
    [pageSize]="pageSize"
    [pageIndex]="page"
    [length]="totalElements"
    class="sticky left-0"
    (page)="refreshPaginatorNext($event)"
  >
  </mat-paginator>
</div>

<mat-menu
  #columnFilterMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <button
    (click)="toggleColumnVisibility(column, $event)"
    *ngFor="let column of columns"
    class="mat-menu-item block"
  >
    <mat-checkbox
      (click)="$event.stopPropagation()"
      [(ngModel)]="column.visible"
      color="primary"
    >
      {{ column.label }}
    </mat-checkbox>
  </button>
</mat-menu>

<mat-menu
  #actionsMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <ng-template
    let-customer="customer"
    matMenuContent
  >
    <button
      (click)="updateCustomer(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:edit"></mat-icon>
      <span>Editar</span>
    </button>
    <button
      (click)="deleteCustomer(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:delete"></mat-icon>
      <span>Eliminar</span>
    </button>
  </ng-template>
</mat-menu>

<ng-template #confirmDialog>
  <h2 matDialogTitle>Eliminar persona</h2>
  <mat-dialog-content>
    <p>Desea eliminar la persona?</p>
  </mat-dialog-content>
  <mat-dialog-actions class="flex gap-1 justify-center">
    <button
      mat-button
      matDialogClose
      mat-raised-button
      color="primary"
    >
      Cancelar
    </button>
    <button
      mat-button
      [matDialogClose]="'delete'"
      mat-raised-button
      color="warn"
    >
      Eliminar
    </button>
  </mat-dialog-actions>
</ng-template>
