<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Apoyo operación', 'Personas']"
    class="flex-auto"
  ></vex-breadcrumbs>

  <button
    class="ml-2"
    color="primary"
    mat-icon-button
    type="button"
  >
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>
<div class="card pt-6">
  <div class="flex flex-col sm:flex-row sm:gap-4 mt-3 pt-3">
    <div
      class="form-content-item flex flex-row items-center justify-center gap-4"
      style="align-items: flex-start"
    >
      <div style="margin-left: 6px">
        @if (availableRoles) {
          <button
            color="primary"
            aria-label=""
            type="button"
            mat-flat-button
            (click)="createCustomer()"
            name="crear"
            class="flex-none"
          >
            <mat-icon svgIcon="mat:add"></mat-icon>
            Nueva persona
          </button>
        }
      </div>

      <mat-form-field class="flex-none">
        <mat-label>Búsqueda de persona</mat-label>
        <input
          matInput
          placeholder="Número de documento"
          type="text"
          name="search"
          [formControl]="searchControl"
          (keyup.enter)="onEnterSearch()"
        />
      </mat-form-field>
    </div>
  </div>
</div>

<div
  class="mt-6 relative pb-8"
>
  <table
    [dataSource]="dataSource"
    class="w-full"
    mat-table
    matSort
  >
    <!--- Note that these columns can be defined in any order.
              The actual rendered columns are set as a property on the row definition" -->

    <!-- Checkbox Column -->
    <ng-container matColumnDef="checkbox">
      <th
        *matHeaderCellDef
        mat-header-cell
      >
        <mat-checkbox
          (change)="$event ? masterToggle() : null"
          [checked]="selection.hasValue() && isAllSelected()"
          [indeterminate]="selection.hasValue() && !isAllSelected()"
          color="primary"
        >
        </mat-checkbox>
      </th>
      <td
        *matCellDef="let row"
        class="w-4"
        mat-cell
      >
        <mat-checkbox
          (change)="$event ? selection.toggle(row) : null"
          (click)="$event.stopPropagation()"
          [checked]="selection.isSelected(row)"
          color="primary"
        >
        </mat-checkbox>
      </td>
    </ng-container>

    @for (column of columns; track column.property) {
      @switch (column.type) {
        @case ("text") {
          <!-- Text Columns -->
          <ng-container [matColumnDef]="column.property">
            <th
              *matHeaderCellDef
              mat-header-cell
              mat-sort-header
            >
              {{ column.label }}
            </th>
            <td
              *matCellDef="let row"
              [class]="column.cssClasses"
              mat-cell
            >
              {{ row[column.property] }}
            </td>
          </ng-container>
        }
      }
    }
    <!-- Action Column -->
    @if (availableRoles) {
      <ng-container matColumnDef="actions">
        <th
          *matHeaderCellDef
          mat-header-cell
          mat-sort-header
        ></th>
        <td
          *matCellDef="let row"
          class="w-10 text-secondary"
          mat-cell
        >
          <button
            (click)="$event.stopPropagation()"
            [matMenuTriggerData]="{ customer: row }"
            [matMenuTriggerFor]="actionsMenu"
            mat-icon-button
            type="button"
          >
            <mat-icon svgIcon="mat:more_horiz"></mat-icon>
          </button>
        </td>
      </ng-container>
    }
    <tr
      *matHeaderRowDef="visibleColumns()"
      mat-header-row
    ></tr>
    <tr
      (click)="availableRoles && updateCustomer(row)"
      *matRowDef="let row; columns: visibleColumns()"
      class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
      mat-row
    ></tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="pageSizeOptions"
    [pageSize]="pageSize"
    [pageIndex]="page"
    [length]="totalElements"
    class="sticky left-0"
    (page)="refreshPaginatorNext($event)"
  >
  </mat-paginator>
</div>

<mat-menu
  #actionsMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <ng-template
    let-customer="customer"
    matMenuContent
  >
    <button
      (click)="updateCustomer(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:edit"></mat-icon>
      <span>Editar</span>
    </button>
    <button
      (click)="deleteCustomer(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:delete"></mat-icon>
      <span>Eliminar</span>
    </button>
  </ng-template>
</mat-menu>
