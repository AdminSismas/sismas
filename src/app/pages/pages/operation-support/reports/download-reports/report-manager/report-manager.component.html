<vex-page-layout>
  <vex-secondary-toolbar current="Formulario">
    <vex-breadcrumbs
      [crumbs]="['Apoyo operación', 'Reportes', 'Descarga de reportes']"
      class="flex-auto"
    ></vex-breadcrumbs>
  </vex-secondary-toolbar>

  <vex-page-layout-content class="-mt-2 px-5">
    @if (!viewDetail()) {
      <vex-report-master
        (viewDetail)="viewDetail.set($event)"
        (selectedCategory)="selectedCategory.set($event)"
      ></vex-report-master>
    } @else {
      <div class="card overflow-auto mt-8">
        <vex-download-reports
          [categoryId]="selectedCategory()?.id"
          [categoryName]="selectedCategory()?.name"
          (backToMaster)="viewDetail.set(false)"
        >
        </vex-download-reports>
      </div>
    }
  </vex-page-layout-content>
</vex-page-layout>
