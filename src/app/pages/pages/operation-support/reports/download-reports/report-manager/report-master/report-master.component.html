<div
      class="card overflow-auto mt-8"
    >
      <div
        class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center"
      >
        <div
          class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center"
        >
          <span class="flex-1"></span>
          <!-- Campo de búsqueda -->
          <mat-form-field
            subscriptSizing="dynamic"
            class="pl-1 pr-1 pt-6 pb-6 flex flex-col"
          >
            <mat-icon
              matIconPrefix
              svgIcon="mat:search"
            ></mat-icon>
            <input
              matInput
              (keyup)="applyFilter($event)"
              placeholder="Buscar reporte"
              type="text"
            />
          </mat-form-field>
        </div>
      </div>

      <table
        mat-table
        [dataSource]="dataSource"
        class="w-full"
        matSort
      >
        <!-- Columna Acción (antes de ID) -->
        <ng-container matColumnDef="action">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            Acción
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            <button
              (click)="selectCategory(element.urlEnd, element.name)"
              mat-icon-button
              title="Ejecutar reporte"
              class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-primary-600 bg-primary-600/10"
            >
              <mat-icon
                class="icon-sm"
                svgIcon="mat:play_arrow"
              ></mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Columna ID -->
        <ng-container matColumnDef="id">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
          >
            ID
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.id }}
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
          >
            Nombre
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
          Reporte trámites {{ element.name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="outputFormat">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
          >
            Formato
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{ element.outputFormat }}
          </td>
        </ng-container>

        <tr
          mat-header-row
          *matHeaderRowDef="displayedColumns"
        ></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
        ></tr>
      </table>

      <mat-paginator
        #categoryPaginator
        [pageSizeOptions]="paginatorOptions"
        showFirstLastButtons
        [pageSize]="pageSize"
        [pageIndex]="page"
        [length]="totalElements"
        (page)="changePage($event)"
      ></mat-paginator>
    </div>
