<vex-page-layout>
    <vex-secondary-toolbar current="Formulario">
        <vex-breadcrumbs [crumbs]="['Apoyo operación', 'Reportes', 'Descarga de reportes']"
          class="flex-auto"></vex-breadcrumbs>

      </vex-secondary-toolbar>
  
      <vex-page-layout-content class="-mt-2 px-5">
      
      <div *ngIf="viewMode === 'master'" class="card overflow-auto mt-8">
   

        <div class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center">

      
          <div class="bg-app-bar px-4 h-16 border-b sticky left-0 flex items-center">
            <span class="flex-1"></span>
            <!-- Campo de búsqueda -->
            <mat-form-field subscriptSizing="dynamic" class="pl-1 pr-1 pt-6 pb-6 flex flex-col">
              <mat-icon matIconPrefix svgIcon="mat:search"></mat-icon>
              <input matInput (keyup)="applyFilter($event)" placeholder="Buscar reporte" type="text">
            </mat-form-field>
  
  
          </div>
  
        </div>

        <table mat-table [dataSource]="dataSource" class="w-full" matSort>

          <!-- Columna Acción (antes de ID) -->
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>Acción</th>
            <td mat-cell *matCellDef="let element">
              <button (click)="selectCategory(element)" mat-icon-button title="Ejecutar reporte" class="w-8 h-8 p-0 leading-none flex items-center justify-center ml-1 hover:bg-hover text-primary-600 bg-primary-600/10">
                <mat-icon class="icon-sm" svgIcon="mat:play_arrow"></mat-icon>
              </button>
            </td>
          </ng-container>
        
          <!-- Columna ID -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
            <td mat-cell *matCellDef="let element">{{ element.id }}</td>
          </ng-container>
        
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
            <td mat-cell *matCellDef="let element">{{ element.name }}</td>
          </ng-container>
        
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
            <td mat-cell *matCellDef="let element">
              <span [ngClass]="{'text-blue-500': element.status === 'FINALIZADO', 'text-red-500': element.status === 'ERROR'}">
                {{ element.status }}
              </span>
            </td>
          </ng-container>
        
          <ng-container matColumnDef="statusDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha estado</th>
            <td mat-cell *matCellDef="let element">{{ element.statusDate }}</td>
          </ng-container>
        
          <ng-container matColumnDef="outputFormat">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Formato</th>
            <td mat-cell *matCellDef="let element">{{ element.outputFormat }}</td>
          </ng-container>
        
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        
        </table>
        
        
  
        <mat-paginator #categoryPaginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
      </div>
  

      <div *ngIf="viewMode === 'detail'" class="card overflow-auto mt-8">
       

        <vex-download-reports
          [categoryId]="selectedCategory?.id"  
          [categoryName]="selectedCategory?.name" 
          (backToMaster)="viewMode = 'master'">
        </vex-download-reports>
  
      
      </div>
  
    </vex-page-layout-content>
  </vex-page-layout>
