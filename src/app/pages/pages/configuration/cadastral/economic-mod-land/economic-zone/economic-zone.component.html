<table
  mat-table
  [dataSource]="dataSource"
  multiTemplateDataRows
  class="mat-elevation-z8 w-full"
>
  @for (column of columns; track columns) {
    <ng-container [matColumnDef]="column.name">
      <th
        mat-header-cell
        *matHeaderCellDef
      >
        {{ column.title }}
      </th>
      <td
        mat-cell
        *matCellDef="let element"
      >
        {{ element[column.name] }}
      </td>
    </ng-container>
  }

  <ng-container matColumnDef="expand">
    <th
      mat-header-cell
      *matHeaderCellDef
      aria-label="row actions"
    >
      Ver detalles
    </th>
    <td
      mat-cell
      *matCellDef="let element"
    >
      <button
        mat-icon-button
        aria-label="expand row"
        (click)="
          expandedElement = expandedElement === element ? null : element;
          $event.stopPropagation()
        "
      >
        @if (expandedElement === element) {
          <mat-icon svgIcon="mat:keyboard_arrow_up"></mat-icon>
        } @else {
          <mat-icon svgIcon="mat:keyboard_arrow_down"></mat-icon>
        }
      </button>
    </td>
  </ng-container>

  <!-- Expanded Content Column - the detail row is made up of this one column that spans across all columns -->
  <ng-container matColumnDef="expandedDetail">
    <td
      mat-cell
      *matCellDef="let element"
      [attr.colspan]="columnsToDisplayWithExpand.length"
    >
      <div
        class="overflow-hidden grid grid-cols-2 gap-x-4 gap-y-2 grid-flow-row"
        [@detailExpand]="element === expandedElement ? 'expanded' : 'collapsed'"
      >
        <h2>{{ element | json }}</h2>
      </div>
    </td>
  </ng-container>

  <tr
    mat-header-row
    *matHeaderRowDef="columnsToDisplayWithExpand"
  ></tr>
  <tr
    class="cursor-pointer"
    mat-row
    *matRowDef="let row; columns: columnsToDisplayWithExpand"
    (click)="expandRow(row)"
  ></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: ['expandedDetail']"
    [class.h-0]="true"
    [style.display]="row === expandedElement ? '' : 'none'"
  ></tr>
</table>
