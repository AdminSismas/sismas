<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración', 'Catastral', 'Mod económico terreno']"
    class="flex-auto"
  ></vex-breadcrumbs>

  <button
    class="ml-2"
    color="primary"
    mat-icon-button
    type="button"
  >
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>

<mat-tab-group class="w-full h-full">
  <mat-tab label="Urbana">
    <div class="w-full h-full">
      <physical-zone
        typeZone="urbanas"
      ></physical-zone>
    </div>
  </mat-tab>
  <mat-tab label="Rural">
    <div class="w-full h-full">
      <physical-zone
        typeZone="rurales"
      ></physical-zone>
    </div>
  </mat-tab>
  <mat-tab label="Geoeconómica">
    <div class="w-full h-full">
      <physical-zone
        typeZone="geoeconómicas"
      ></physical-zone>
    </div>
  </mat-tab>
</mat-tab-group>
