<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración', 'General', 'Usuarios']"
    class="flex-auto"
  ></vex-breadcrumbs>

  <button
    class="ml-2"
    color="primary"
    mat-icon-button
    type="button"
  >
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>
<!-- <vex-in-construction></vex-in-construction> -->

<vex-page-layout>
  <vex-page-layout-content>
    <button
      mat-raised-button
      color="primary"
      (click)="openDialogAddUser()"
      class="mb-4"
    >
      Nuevo Usuario
      <mat-icon svgIcon="mat:add"></mat-icon>
    </button>
    <table
      mat-table
      [dataSource]="dataSource"
      class="mat-elevation-z8"
    >
      @for (column of columns; track column.name) {
        <ng-container [matColumnDef]="column.name">
          <th
            mat-header-cell
            *matHeaderCellDef
          >
            {{ column.label }}
          </th>
          <td
            mat-cell
            *matCellDef="let element"
          >
            {{
              column.name !== "fullName"
                ? showTableValue(element[column.name], column.name)
                : (element[column.name] | titlecase)
            }}
          </td>
        </ng-container>
      }
      <ng-container matColumnDef="actions">
        <th
          mat-header-cell
          *matHeaderCellDef
        >
          Acciones
        </th>
        <td
          mat-cell
          *matCellDef="let element"
        >
          <button
            mat-icon-button
            color="primary"
            type="button"
            [matMenuTriggerData]="{ row: element }"
            [matMenuTriggerFor]="actionsMenu"
          >
            <mat-icon svgIcon="mat:more_horiz"></mat-icon>
          </button>
        </td>
      </ng-container>
      <tr
        mat-header-row
        *matHeaderRowDef="displayedColumns"
      ></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
      ></tr>
    </table>
    <mat-paginator
      [pageSizeOptions]="pageSizeOptions"
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageIndex]="page"
      (page)="pageEvent($event)"
    >
    </mat-paginator>
    <mat-menu
      #actionsMenu="matMenu"
      xPosition="before"
      yPosition="below"
    >
      <ng-template
        let-row="row"
        matMenuContent
      >
        @for (action of actionBtns(); track action.name) {
          <button
            (click)="actionMenuHandler(action.name, row)"
            mat-menu-item
          >
            <mat-icon svgIcon="{{ action.icon }}"></mat-icon>
            {{ action.label }}
          </button>
        }
      </ng-template>
    </mat-menu>
  </vex-page-layout-content>
</vex-page-layout>
