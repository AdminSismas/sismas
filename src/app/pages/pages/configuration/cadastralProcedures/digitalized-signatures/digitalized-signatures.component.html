<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración', 'Trámites catastrales', 'Firmas digitalizadas']"
    class="flex-auto"
  ></vex-breadcrumbs>

  <button
    class="ml-2"
    color="primary"
    mat-icon-button
    type="button"
  >
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>
<vex-page-layout>
  <vex-page-layout-header>
    <button
      mat-raised-button
      color="primary"
      (click)="openDialogCreateSignature()"
    >
      <mat-icon svgIcon="mat:add"></mat-icon>
      Nuevo
    </button>
  </vex-page-layout-header>

  <vex-page-layout-content>
    <main class="h-full">
      <table-digitalized-signatures
        [isDesktop$]="isDesktop$"
      ></table-digitalized-signatures>
    </main>
  </vex-page-layout-content>
</vex-page-layout>
