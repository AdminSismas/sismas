<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración','Trámites catastrales', 'Documentos asociados a trámites']"
    class="flex-auto"></vex-breadcrumbs>

  <button class="ml-2" color="primary" mat-icon-button type="button">
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>
<!-- <vex-in-construction></vex-in-construction> -->
<vex-page-layout>

  <vex-page-layout-content class="px-5 -mt-6">

    <div class="card overflow-auto mt-8">

      <!-- Tabla de dominios -->
      <table @stagger mat-table [dataSource]="dataSource" class="w-full " matSort>


        <!-- View button basic -->
        <!-- <ng-container matColumnDef="detailDirection">
           <th mat-header-cell *matHeaderCellDef> Detalle </th> 
           <td mat-cell *matCellDef="let row">
             <button
               (click)="informationDetail(row)"
               mat-icon-button
               title="Detalle del tramite">
               <mat-icon class="icon-sm" svgIcon="mat:remove_red_eye"></mat-icon>
             </button>
           </td>
       </ng-container> -->
  

       <tr mat-header-row *matHeaderRowDef="visibleColumns"></tr>
       <tr mat-row *matRowDef="let element; columns: visibleColumns;" @fadeInUp class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"></tr>
   </table>

   <!-- Paginador -->
   <mat-paginator
       #paginator
       [class.hidden]="!(isDesktop$ | async)"
       [pageSizeOptions]="pageSizeOptions"
       [length]="totalElements"
       [pageSize]="pageSize"
       [pageIndex]="page"
       (page)="refreshInformationPaginator($event)"
       class="sticky left-0 flex flex-col">
   </mat-paginator>

    </div>

  </vex-page-layout-content>

</vex-page-layout>

<mat-menu
  #columnFilterMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <button
    (click)="toggleColumnVisibility(column, $event)"
    *ngFor="let column of columns"
    class="mat-menu-item block"
  >
    <mat-checkbox
      (click)="$event.stopPropagation()"
      [(ngModel)]="column.visible"
      color="primary"
    >
      {{ column.label }}
    </mat-checkbox>
  </button>
</mat-menu>
<mat-menu
  #actionsMenu="matMenu"
  xPosition="before"
  yPosition="below"
>
  <ng-template
    let-customer="customer"
    matMenuContent
  >
    <button
      (click)="editInformations(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:edit"></mat-icon>
      <span>Editar</span>
    </button>
    <button
      (click)="deleteInformations(customer)"
      mat-menu-item
    >
      <mat-icon svgIcon="mat:delete"></mat-icon>
      <span>Eliminar</span>
    </button>
  </ng-template>
</mat-menu>
