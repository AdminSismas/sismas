<vex-secondary-toolbar current="Formulario">
  <vex-breadcrumbs
    [crumbs]="['Configuración','Trámites catastrales', 'Grupos de trabajo']"
    class="flex-auto"></vex-breadcrumbs>

  <button class="ml-2" color="primary" mat-icon-button type="button">
    <mat-icon svgIcon="mat:more_vert"></mat-icon>
  </button>
</vex-secondary-toolbar>


<div class="mat-content">
  <div class="block">
    <div class="w-full">
      <mat-card>
        
        <!-- Barra superior con el botón de "Nuevo" y el buscador -->
        <mat-card-header>
        
          <div class="mat-header-actions">
   
            <button mat-raised-button color="primary" class="btn-new" (click)="openDialog()">
              Nuevo
              <mat-icon svgIcon="mat:add"></mat-icon>
            </button>
          
            <!-- Campo de búsqueda -->
            <mat-form-field class="search-field" appearance="outline">
              <mat-icon matPrefix svgIcon="mat:search"></mat-icon>
              <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" placeholder="Buscar..." />
            </mat-form-field>

          </div>
        </mat-card-header>

        <!-- Contenido de la tabla -->
        <mat-card-content>
          <div class="overflow-x-auto">
            <table mat-table [dataSource]="dataSource" class="w-full">
              <!-- Nombre Columna -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef><strong>Nombre</strong></th>
                <td mat-cell *matCellDef="let element">{{ element.name }}</td>
              </ng-container>

              <!-- Descripción Columna -->
              <ng-container matColumnDef="description">
                <th mat-header-cell *matHeaderCellDef><strong>Descripción</strong></th>
                <td mat-cell *matCellDef="let element">{{ element.description }}</td>
              </ng-container>

              <!-- Acciones Columna -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef><strong>Acciones</strong></th>
                <td mat-cell *matCellDef="let element">
                  <button mat-icon-button color="primary" (click)="openDialog(element)">
                    <mat-icon svgIcon="mat:edit"></mat-icon>
                  </button>
                </td>
              </ng-container>

              <!-- Filas de la tabla -->
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
          </div>
        </mat-card-content>

        <!-- Paginador -->
        <mat-paginator
          [pageSizeOptions]="pageSizeOptions"
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageIndex]="page"
          (page)="onPageChange($event)">
        </mat-paginator>
      </mat-card>
    </div>
  </div>
</div>
