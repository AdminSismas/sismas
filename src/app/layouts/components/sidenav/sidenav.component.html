
<div
  (mouseenter)="collapseOpenSidenav()"
  (mouseleave)="collapseCloseSidenav()"
  [class.collapsed]="collapsed"
  [class.open]="collapsed && (collapsedOpen$ | async)"
  class="vex-sidenav flex flex-col">
  <div class="vex-sidenav-toolbar__container">
    <div class="sidenav-toolbar flex-none flex items-center">
      <img
        [src]="imageUrl$ | async"
        alt="Logo"
        class="w-6 select-none flex-none" />
      <h2 class="vex-sidenav-toolbar__headline flex-auto clickable" >
        <a  (click)="navigateToCadastralSearch()" class="text-decoration-none">
          {{ title$ | async }}
        </a>
      </h2>
      <button
        (click)="toggleCollapse()"
        *ngIf="showCollapsePin$ | async"
        class="vex-sidenav-toolbar__collapse-toggle -mr-4 leading-none flex-none hidden lg:block"
        mat-icon-button
        type="button">
        <mat-icon *ngIf="!collapsed">push_pin</mat-icon>
        <mat-icon *ngIf="collapsed" >
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e8eaed"><path d="M680-840v80h-40v327l-80-80v-247H400v87l-87-87-33-33v-47h400ZM480-40l-40-40v-240H240v-80l80-80v-46L56-792l56-56 736 736-58 56-264-264h-6v240l-40 40ZM354-400h92l-44-44-2-2-46 46Zm126-193Zm-78 149Z"/></svg>
        </mat-icon>
      </button>
    </div>
    <div *ngIf="searchVisible$ | async" class="vex-sidenav-search__container">
      <form [formGroup]="form" >
        <div
          (click)="seeRutList()"
          class="vex-sidenav-search relative"
          matRipple
          matRippleColor="rgb(var(--vex-color-primary-600), 0.1)">
          <input
          matInput
          placeholder="Búsqueda rápida"
          formControlName="searchRuote"
          name="searchRuote"
          [matAutocomplete]="routeSearch"
        />
        <mat-autocomplete autoActiveFirstOption #routeSearch="matAutocomplete" [panelWidth]="350"
        (optionSelected)="loadBlocksRouteList($event.option.value, true)">

        @if(this.listRouteItem.length > 0) {
          @for (option of filteredRouteList$ | async; track option.label;) {

            <!-- Sila lista tiene solo una opcion  -->
            @if (option.type === 'link') {
              <mat-option
              [value]="option.label">
              {{ option.label}}
              </mat-option>

              <!-- Si la lista tiene un subMenu con hijos  -->
            }
          <!-- <mat-option
          [value]="option.label">
          {{ option.codeName}}
          </mat-option>
          } @empty {
          <mat-option>
          {{validationField}}
          </mat-option> -->
          }

        }
        </mat-autocomplete>
          <!-- <mat-icon
            class="flex-none vex-sidenav-search__icon"
            svgIcon="mat:search"></mat-icon>
          <div class="flex-auto vex-sidenav-search__placeholder">
            Búsqueda rápida
          </div>
          <div class="flex-none vex-sidenav-search__keybind">Ctrl K</div> -->
        </div>

      </form>

      <!-- Campo barrio -->
      <!-- <mat-form-field class="sm:ml-2 sm:mr-2 flex-1">
        <mat-label>Lista del menú</mat-label>
        <input type="text"
               aria-label="Number"
               matInput
               formControlName="neighborhood"
               placeholder="Seleccione un comuna&hellip;"
               [matAutocomplete]="autoNeighborhood">
        <mat-autocomplete autoActiveFirstOption #autoNeighborhood="matAutocomplete" [panelWidth]="350"
                          (optionSelected)="loadBlocksRouteList($event.option.value, true)">
          @for (option of filteredOptionsNeighborhoods$ | async; track option.codigoBarrio;) {
            <mat-option
              [value]="option.codeName">
              {{ option.codeName}}
            </mat-option>
          } @empty {
            <mat-option>
              {{validationField}}
            </mat-option>
          }
        </mat-autocomplete>
      </mat-form-field> -->

    </div>

    <div class="vex-sidenav-toolbar__divider"></div>
  </div>

  <vex-scrollbar class="flex-1 flex flex-col">
    <div class="pt-6 flex-1">
      <vex-sidenav-item
        *ngFor="let item of items$ | async; trackBy: trackByRoute"
        [item]="item"
        [level]="0"></vex-sidenav-item>
    </div>

    <div
      class="vex-sidenav-footer flex items-center justify-center opacity-20 px-6 py-6 select-none flex-none">
      <img [src]="imageUrl$ | async" alt="Logo" class="w-8 select-none" />
    </div>
  </vex-scrollbar>

  <div
    *ngIf="userVisible$ | async"
    class="vex-sidenav-user__container flex-none">
    <div
      #userProfileMenuOriginRef
      (click)="openProfileMenu(userProfileMenuOriginRef)"
      [class.vex-sidenav-user--open]="userMenuOpen$ | async"
      class="vex-sidenav-user flex items-center"
      matRipple
      matRippleColor="var(--vex-sidenav-item-ripple-color)">
      <img
        alt="User Avatar"
        class="vex-sidenav-user__image flex-none"
        src="../../../../assets/img/avatars/noavatar.png" />
      <div class="vex-sidenav-user__content flex-auto">
        <div class="vex-sidenav-user__title">{{user?.username}}</div>
        <div class="vex-sidenav-user__subtitle">{{ user?.role}}</div>
      </div>
      <mat-icon
        class="vex-sidenav-user__dropdown-icon flex-none"
        svgIcon="mat:arrow_drop_down"></mat-icon>
    </div>
  </div>
</div>
