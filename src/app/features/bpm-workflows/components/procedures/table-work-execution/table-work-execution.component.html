    <!-- Tabla de dominios -->
    <table @stagger mat-table [dataSource]="dataSource" class="w-full " matSort>
        <!-- View button basic -->
        <ng-container matColumnDef="detailDirection">
            <th mat-header-cell *matHeaderCellDef> Detalle </th> <!-- Encabezado -->
            <td mat-cell *matCellDef="let row">
              <button
                (click)="informationDetail(row)"
                mat-icon-button
                title="Detalle del tramite">
                <mat-icon class="icon-sm" svgIcon="mat:remove_red_eye"></mat-icon>
              </button>
            </td>
        </ng-container>

        <!-- Text Columns -->
        @for (column of columns; track column.property) {
            <ng-container *ngIf="column.type === 'text'" [matColumnDef]="column.property">
                <th *matHeaderCellDef mat-header-cell mat-sort-header>
                    {{ column.label }}
                </th>
                <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                    {{ row[column.property] }}
                </td>
            </ng-container>

            <ng-container *ngIf="column.type === 'date'" [matColumnDef]="column.property">
                <th *matHeaderCellDef mat-header-cell mat-sort-header>
                    {{ column.label }}
                </th>
                <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
                    <mat-icon matIconPrefix *ngIf="column.property === 'originalFileName'" svgIcon="mat:picture_as_pdf" class="w-5 h-5 p-0 items-center justify-center text-red-600"></mat-icon>
                    {{ row[column.property] | date:'YYYY-MM-dd' }}
                </td>
            </ng-container>
        }

        <tr mat-header-row *matHeaderRowDef="visibleColumns"></tr>
        <tr mat-row *matRowDef="let element; columns: visibleColumns;" @fadeInUp class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"></tr>
    </table>

    <!-- Paginador -->
    <mat-paginator
        #paginator
        [class.flex.flex-col]="isDesktop$ | async"
        [pageSizeOptions]="pageSizeOptions"
        [length]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="page"
        (page)="refreshInformationpaginator($event)"
        class="sticky left-0 hidden">
    </mat-paginator>
</vex-page-layout>
