<vex-scrollbar class="h-full relative" [id]="id">
  <div class="flex flex-col justify-between" [id]="id + 'Container'">
    <div vexFluidHeight fluidHeight=280>
      <table
        @stagger
        [dataSource]="dataSource"
        class="w-full flex-auto"
        mat-table
        matSort>

        <!-- Checkbox Column -->
        <ng-container matColumnDef="selected">
          <th *matHeaderCellDef mat-header-cell
              class="pl-1 pr-1">
            <mat-checkbox
              (change)="$event ? masterToggle() : null"
              [checked]="selection.hasValue() && isAllSelected()"
              [indeterminate]="selection.hasValue() && !isAllSelected()"
              color="primary">
            </mat-checkbox>
          </th>
          <td *matCellDef="let row" class="w-4 pl-1 pr-1" mat-cell>
            <mat-checkbox
              (change)="$event ? selection.toggle(row) : null"
              (click)="$event.stopPropagation()"
              [checked]="selection.isSelected(row)"
              color="primary">
            </mat-checkbox>
          </td>
        </ng-container>

        <!-- Image Column -->
        <ng-container matColumnDef="imageSrc">
          <th *matHeaderCellDef mat-header-cell class="pl-1 pr-1 min-w-9"></th>
          <td *matCellDef="let row" class="w-9 min-w-9 pl-1 pr-1" mat-cell>
            <img [src]="row['imageSrc']" class="avatar h-9 min-w-9 align-middle" alt="" />
          </td>
        </ng-container>

        @for (column of columns; track column.property) {
          <!-- Text Columns -->
          <ng-container
            *ngIf="column.type === 'text' && column.property"
            [matColumnDef]="column.property">
            <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase pl-1 pr-1">
              {{ column.label }}
            </th>
            <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
              {{ row[column.property] }}
            </td>
          </ng-container>

          <!-- date Columns -->
          <ng-container
            *ngIf="column.type === 'date' && column.property"
            [matColumnDef]="column.property">
            <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase pl-1 pr-1">
              {{ column.label }}
            </th>
            <td *matCellDef="let row" [ngClass]="column.cssClasses" mat-cell>
              {{ row[column.property] | date: 'short' }}
            </td>
          </ng-container>
        }

        <!-- type Process Participant Columns-->
        <ng-container matColumnDef="typeProcessParticipant">
          <th
            *matHeaderCellDef
            class="uppercase pl-1 pr-1"
            mat-header-cell
            mat-sort-header>
            {{ 'Estados' }}
          </th>
          <td *matCellDef="let row"
              class="pl-1 pr-1"
              mat-cell>
            <button
              (click)="emitToggleStar($event, row.id)"
              mat-icon-button
              type="button">
              <mat-icon
                class="text-amber-600"
                svgIcon="mat:label"></mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- Action Column -->
        <ng-container matColumnDef="menu">
          <th *matHeaderCellDef mat-header-cell mat-sort-header class="uppercase pl-1 pr-1"></th>
          <td *matCellDef="let row" class="w-10 text-secondary pl-1 pr-1" mat-cell>
            <button
              (click)="$event.stopPropagation()"
              [matMenuTriggerData]="{ customer: row }"
              [matMenuTriggerFor]="contactMenu"
              mat-icon-button
              type="button">
              <mat-icon svgIcon="mat:more_horiz"></mat-icon>
            </button>
          </td>
        </ng-container>

        <tr *matHeaderRowDef="visibleColumns; sticky: true" mat-header-row></tr>
        <tr
          (click)="openDetailProcessParticipant.emit(row.id)"
          *matRowDef="let row; columns: visibleColumns"
          @fadeInUp
          class="hover:bg-hover transition duration-400 ease-out-swift cursor-pointer"
          mat-row></tr>
      </table>

      <div
        *ngIf="dataSource.filteredData.length === 0"
        @scaleFadeIn
        class="flex-auto flex flex-col items-center justify-center">
        <img class="m-12 h-64" src="assets/img/illustrations/idea.svg" alt="idea"/>
        <h2 class="headline m-0 text-center">
          No contacts matching your filters
        </h2>
      </div>

    </div>
    <mat-paginator
      [class.hidden]="dataSource.filteredData.length === 0"
      [pageSizeOptions]="pageSizeOptions"
      [pageSize]="pageSize"
      class="sticky bottom-0 left-0 right-0 border-t flex-none"></mat-paginator>
  </div>
</vex-scrollbar>

<mat-menu #contactMenu="matMenu" xPosition="before" yPosition="below">
  <button mat-menu-item>
    <mat-icon svgIcon="mat:edit"></mat-icon>
    <span>Detalles</span>
  </button>

  <button mat-menu-item>
    <mat-icon svgIcon="mat:delete_forever"></mat-icon>
    <span>Delete Contact</span>
  </button>
</mat-menu>
