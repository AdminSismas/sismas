<app-modal-window title="Ver Cambios">
  @if (isLoading()) {
    <div class="flex flex-col gap-4 justify-center items-center h-full">
      <h2 class="text-center text-xl font-bold">Cargando...</h2>
      <mat-spinner diameter="80"></mat-spinner>
    </div>
  } @else {
    @if (srcUrl()) {
      <iframe
        #documentViewer
        [src]="srcUrl()"
        width="100%"
        height="100%"
      ></iframe>
    } @else {
      <h2 class="text-center text-2xl font-bold">
        No se ha encontrado el informe de cambios
      </h2>
    }
  }
</app-modal-window>
