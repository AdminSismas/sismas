<div class="bg-pattern w-screen h-screen flex items-center justify-center">
  <div
    [@fadeInUp]
    class="card overflow-hidden w-full max-w-md"
  >
    <div class="p-6 pb-0 flex flex-col items-center justify-center">
      <div class="fill-current text-center">
        <img
          alt="IT Support"
          class="w-16"
          src="../../../../assets/img/illustrations/it_support.svg"
        />
      </div>
    </div>

    <div class="text-center mt-4">
      <h2 class="title m-0">¿Has olvidado tu contraseña?</h2>
      <h4 class="body-2 text-secondary m-0">
        Introduce tu correo para recuperación de la contraseña.
      </h4>
    </div>

    <div
      [formGroup]="form"
      class="p-6 flex flex-col"
    >
      <mat-form-field>
        <mat-label>Correo</mat-label>

        <mat-icon
          class="mr-2"
          matIconPrefix
          svgIcon="mat:mail"
        ></mat-icon>
        <input
          formControlName="email"
          matInput
          required
        />
        @if (form.invalid && form.touched) {
          <mat-error>
            {{ errorMessage() }}
          </mat-error>
        }
      </mat-form-field>

      <button
        (click)="send()"
        class="mt-2"
        color="primary"
        mat-raised-button
        type="button"
      >
        Enviar
      </button>

      <button
        (click)="back()"
        class="mt-2"
        color="white"
        mat-raised-button
        type="button"
      >
        Regresar
      </button>
    </div>
  </div>
</div>
