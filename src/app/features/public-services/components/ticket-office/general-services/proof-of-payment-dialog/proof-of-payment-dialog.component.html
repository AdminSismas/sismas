<div class="p-6 bg-white rounded-lg shadow-lg w-96">
    <h2 class="text-lg font-bold text-gray-700 mb-4">Subir Comprobante</h2>

    <form [formGroup]="paymentForm" (ngSubmit)="submit()">

      <div class="mb-4">
        <span class="block text-sm font-medium text-gray-600">Número de Referencia</span>
        <input
          formControlName="reference"
          type="text"
          class="w-full p-2 border border-gray-300 rounded mt-1"
          placeholder="Ej: 1234567890"
        />
        <p *ngIf="paymentForm.get('reference')?.invalid && paymentForm.get('reference')?.touched"
           class="text-red-500 text-xs mt-1">
          Número inválido
        </p>
      </div>


      <div class="mb-4">
        <span class="block text-sm font-medium text-gray-600">Subir Comprobante</span>
        <input type="file" (change)="onFileSelected($event)" class="w-full p-2 border border-gray-300 rounded mt-1" />
        <p *ngIf="selectedFile" class="text-xs text-gray-500 mt-1">Archivo seleccionado: {{ selectedFile.name }}</p>
      </div>

      <!-- Botones -->
      <div class="flex justify-end gap-2">
        <button type="button" (click)="close()"
          class="px-4 py-2 text-gray-600 bg-gray-200 rounded">
          Cancelar
        </button>
        <button type="submit"
          [disabled]="paymentForm.invalid"
          class="px-4 py-2 text-white bg-blue-500 rounded">
          Validar
        </button>
      </div>
    </form>
  </div>
