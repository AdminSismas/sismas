<header class="sticky top-0 z-10 bg-slate-100 dark:bg-slate-800">
  <div class="flex justify-between items-center">
    <section class="flex items-center">
      <h2 mat-dialog-title>
        {{ data.individual.fullName }}
      </h2>
      @if(data.showEditPerson){
        <button
          mat-flat-button
          color="primary"
          (click)="editPerson()"
        >
          <mat-icon svgIcon="mat:edit"></mat-icon>
          Editar persona
        </button>
      }
    </section>
    <button
      mat-icon-button
      (click)="close()"
      tabindex="-1"
    >
      <mat-icon svgIcon="mat:close"></mat-icon>
    </button>
  </div>
  <mat-divider class="bg-slate-400"></mat-divider>
</header>

<mat-dialog-content>
  <form
    [formGroup]="form"
    class="grid grid-cols-4 gap-4 grid-flow-row py-2"
  >
    <!-- Edición fracción -->
    <mat-form-field
      [ngClass]="{
        'bg-red-50': form.get('fraction')?.errors?.['invalidFraction']
      }"
    >
      <mat-label>Fracción</mat-label>
      <input
        matInput
        placeholder="Fracción"
        formControlName="fraction"
        min="0"
        max="1"
        step="0.01"
        type="number"
      />
      @if (form.get("fraction")?.errors?.["invalidFraction"]) {
        <mat-error>Fracción no válida</mat-error>
      }
    </mat-form-field>
    <mat-form-field aria-disabled="true">
      <mat-label>Total fracciones</mat-label>
      <input
        matInput
        placeholder="Fracción total"
        formControlName="fractions_sum"
        type="number"
      />
    </mat-form-field>

    <!-- Edición tipo de derecho -->
    <vex-combox-colletion
      idComboCollection="domRightType"
      label="Tipo derecho"
      formControlNameCombobox="domRightType"
      typeDomainName="RightType"
      placeholderDomainName="Seleccionar tipo derecho"
      cssClasses="w-full"
      class="col-span-2"
    ></vex-combox-colletion>

    <!-- Edición fecha -->
    <mat-form-field class="col-span-4">
      <mat-label>Inicio de tenencia</mat-label>
      <input
        matInput
        [matDatepicker]="beginAt"
        formControlName="beginAt"
        [max]="maxDate"
      />
      <mat-hint>Formato fecha: DD/MM/YYYY</mat-hint>
      <mat-datepicker-toggle
        matIconSuffix
        [for]="beginAt"
      ></mat-datepicker-toggle>
      <mat-datepicker #beginAt></mat-datepicker>
    </mat-form-field>

    <!-- Botones de acción -->
    <div class="flex justify-center gap-6 col-span-2">
      <button
        color="primary"
        type="submit"
        mat-flat-button
        class="p-6 text-lg"
        (click)="editRrrightOwnerProperty()"
      >
        Guardar
        <mat-icon svgIcon="mat:save"></mat-icon>
      </button>
      <button
        color="warn"
        type="submit"
        mat-flat-button
        class="p-6 text-lg"
        (click)="close()"
      >
        Cancelar
      </button>
    </div>
  </form>
</mat-dialog-content>
