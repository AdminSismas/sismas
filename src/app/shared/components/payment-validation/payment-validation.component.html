<div class="flex flex-col h-full">
  <header
    class="body-1 mb-0"
    mat-dialog-title
  >
    <div class="flex items-center justify-between pt-3 pb-1">
      <div class="flex items-center gap-9">
        <div class="flex items-center space-x-2">
          <mat-icon
            [svgIcon]="currentIcon()"
            class="w-5 h-5 p-0"
          ></mat-icon>
          <h2 class="title text-2xl headline flex-auto m-0">
            Validación de {{ currentTitle() }}
          </h2>
        </div>
      </div>
      <button
        class="text-secondary items-center w-8 h-8 leading-none rounded-button flex justify-center ml-1 p-0 hover:bg-hover"
        mat-dialog-close
        mat-icon-button
        type="button"
      >
        <mat-icon
          matIconPrefix
          svgIcon="mat:close"
        ></mat-icon>
      </button>
    </div>
    <mat-divider class="-mx-6 mt-3"></mat-divider>
  </header>

  <mat-dialog-content
    class="flex rounded-md border-2 border-gray-300 my-4 mx-6 p-0 h-full max-h-none"
  >
    <div class="p-6 w-full">
      <h3 class="text-lg font-semibold text-gray-700 mb-4">
        Comprobante de {{ currentTitle() }}
      </h3>

      <form
        [formGroup]="paymentForm()"
        (ngSubmit)="validatePayment()"
      >
        @if (!hiddenReference()) {
          <div class="mb-4">
            <label
              class="block text-sm font-medium text-gray-600"
              for="reference"
            >
              Número de Referencia
            </label>
            <input
              class="w-full p-2 border border-gray-300 rounded mt-1"
              formControlName="paymentReference"
              name="reference"
              placeholder="Ej: 1234567890"
              type="text"
            />
          </div>
        }

        <div class="mb-4">
          <label
            class="block text-sm font-medium text-gray-600"
            for="filePicker"
          >
            Subir Comprobante
          </label>
          <input
            class="w-full p-2 border border-gray-300 rounded mt-1"
            name="filePicker"
            type="file"
            formControlName="file"
            (change)="onFileSelected($event)"
          />
        </div>

        <div class="flex justify-end gap-2">
          <button
            type="submit"
            color="primary"
            mat-raised-button
            [disabled]="paymentForm().invalid"
          >
            Validar
          </button>
        </div>
      </form>
    </div>
  </mat-dialog-content>
</div>
